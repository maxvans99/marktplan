// ─── MITARBEITER-ANSICHT ──────────────────────────────────────────────────────
function EmployeeView({ me, marketId, availability, shifts, weekStart, weekDates, onWeekChange, onSave, onChangePassword, onLogout, deadlineDays }) {
  const [sbOpen, setSbOpen] = useState(false);
  const [showPwModal, setShowPwModal] = useState(false);
  const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
  const [pw1, setPw1] = useState(""); const [pw2, setPw2] = useState(""); const [pwErr, setPwErr] = useState(""); const [pwSaved, setPwSaved] = useState(false);

  const myShifts = useMemo(() => {
    const ws = weekDates.map(fmtISO);
    return shifts.filter(s => s.employeeId === me?.id && ws.includes(s.date));
  }, [shifts, me, weekDates]);

  const buildForm = () => Object.fromEntries(weekDates.map(d => {
    const a = availability.find(x => x.employeeId === me?.id && x.date === fmtISO(d));
    return [fmtISO(d), a ? { on: true, start: a.startTime, end: a.endTime } : { on: false, start: "08:00", end: "16:00" }];
  }));

  const [form, setForm] = useState(buildForm);
  const [saved, setSaved] = useState(null); // null = unberührt, false = geändert, true = gespeichert
  useEffect(() => { setForm(buildForm()); setSaved(null); }, [weekStart, me?.id, availability, weekDates]);

  const setDay = (ds, patch) => { setForm(f => ({ ...f, [ds]: { ...f[ds], ...patch } })); setSaved(false); };

  function handleSave() {
    const avails = weekDates.filter(d => form[fmtISO(d)]?.on).map(d => ({
      id: uid(), employeeId: me.id, date: fmtISO(d),
      startTime: form[fmtISO(d)].start, endTime: form[fmtISO(d)].end,
    }));
    onSave(avails); setSaved(true);
  }

  function handleChangePw() {
    if (pw1.length < 4) { setPwErr("Mindestens 4 Zeichen."); return; }
    if (pw1 !== pw2) { setPwErr("Passwörter stimmen nicht überein."); return; }
    onChangePassword(pw1); setPwSaved(true); setPw1(""); setPw2(""); setPwErr("");
    setTimeout(() => { setShowPwModal(false); setPwSaved(false); }, 1500);
  }

  const market = MARKETS.find(m => m.id === marketId);
  const locked = isPastDeadline(weekStart, deadlineDays);
  const deadline = getDeadline(weekStart, deadlineDays);
  const deadlineStr = deadline.toLocaleDateString("de-DE", { weekday: "long", day: "2-digit", month: "2-digit" });

  return (
    <div className="app">
      
      <div className="mob-bar">
        <button className="burger" onClick={() => setSbOpen(true)}>☰</button>
        <span className="mob-logo">Markt<b>Plan</b></span>
        <button className="mob-logout" onClick={() => { if (saved === false) { setShowLogoutConfirm(true); } else { onLogout(); } }}>Abmelden</button>
      </div>
      {sbOpen && <div className="sb-overlay" onClick={() => setSbOpen(false)} />}
      <Sidebar role="employee" marketId={marketId} onMarketChange={() => {}} onLogout={() => { if (saved === false) { setShowLogoutConfirm(true); setSbOpen(false); } else { onLogout(); } }}
        empName={me?.name} onChangePw={() => { setShowPwModal(true); setSbOpen(false); }}
        sbOpen={sbOpen} onClose={() => setSbOpen(false)} />
      <div className="main">
        <div className="ph">
          <div className="ph-left">
            <div className="ph-title">Mein Schichtplan</div>
            <div className="ph-sub">{me?.name} · {market?.name}</div>
          </div>
          <button className="btn-logout-top" onClick={() => { if (saved === false) { setShowLogoutConfirm(true); } else { onLogout(); } }}>← Abmelden</button>
        </div>

        <WeekNav weekStart={weekStart} weekDates={weekDates} onChange={onWeekChange} />

        <div className="sec-label" style={{ marginBottom: 10 }}>Meine Schichten diese Woche</div>
        <div className="avcard" style={{ marginBottom: 20 }}>
          {myShifts.length === 0
            ? <div className="empty-sched">Noch keine Schichten für diese Woche eingeplant.</div>
            : weekDates.map((d, i) => {
                const sh = myShifts.find(s => s.date === fmtISO(d));
                if (!sh) return null;
                return (
                  <div key={fmtISO(d)} className="sched-row">
                    <div className="sched-day">{DAY_NAMES[i]}, {fmtShort(d)}</div>
                    <div className="sched-time">{sh.startTime} – {sh.endTime} Uhr</div>
                    <div className="sched-badge">Eingeplant</div>
                  </div>
                );
              })}
        </div>

        <div className="sec-label" style={{ marginBottom: 10 }}>Meine Verfügbarkeit eintragen</div>
        {locked && (
          <div className="alert-w" style={{ marginBottom: 14 }}>
            🔒 Frist abgelaufen — Eintragen war bis {deadlineStr}, 23:59 Uhr möglich. Änderungen für diese Woche sind nicht mehr möglich.
          </div>
        )}
        <div className="avcard" style={{ opacity: locked ? 0.6 : 1 }}>
          {weekDates.map((d, i) => {
            const ds = fmtISO(d); const day = form[ds] || { on: false, start: "08:00", end: "16:00" };
            return (
              <div key={ds} className="av-row">
                <div className="av-d">{DAY_NAMES[i]}</div>
                <div className="av-date">{fmtShort(d)}</div>
                <label className="toggle">
                  <input type="checkbox" checked={day.on} disabled={locked} onChange={e => !locked && setDay(ds, { on: e.target.checked })} />
                  <span className="t-track" style={{ cursor: locked ? "not-allowed" : "pointer" }} />
                </label>
                {day.on
                  ? <div className="tr">
                      <input type="time" value={day.start} disabled={locked} onChange={e => !locked && setDay(ds, { start: e.target.value })} />
                      <span className="tr-sep">–</span>
                      <input type="time" value={day.end} disabled={locked} onChange={e => !locked && setDay(ds, { end: e.target.value })} />
                    </div>
                  : <div className="av-none">Nicht verfügbar</div>}
              </div>
            );
          })}
          <div className="save-bar">
            <button className="btn-save" disabled={locked} onClick={handleSave}
              style={{ opacity: locked ? 0.4 : 1, cursor: locked ? "not-allowed" : "pointer" }}>
              Verfügbarkeit speichern
            </button>
            {saved === true && <div className="saved">✓ Gespeichert</div>}
            {saved === false && !locked && <div style={{ fontSize: 12, color: "#F59E0B", fontWeight: 600 }}>⚠ Nicht gespeichert</div>}
            {!locked && <div style={{ fontSize: 12, color: "#94A3B8" }}>Frist: {deadlineStr}, 23:59 Uhr</div>}
          </div>
        </div>
      </div>

      {showLogoutConfirm && (
        <div className="ov" onClick={() => setShowLogoutConfirm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Nicht gespeichert</div>
            <div className="modal-s">Du hast Zeiten eingetragen, aber noch nicht gespeichert. Wenn du dich jetzt abmeldest, gehen deine Eingaben verloren.</div>
            <div className="macts">
              <button className="btn-cancel" onClick={() => setShowLogoutConfirm(false)}>Zurück</button>
              <button className="btn-save" style={{ flex: 1 }} onClick={() => { handleSave(); setShowLogoutConfirm(false); }}>Jetzt speichern</button>
              <button className="btn-del" onClick={onLogout}>Trotzdem abmelden</button>
            </div>
          </div>
        </div>
      )}

      {showPwModal && (
        <div className="ov" onClick={() => { setShowPwModal(false); setPw1(""); setPw2(""); setPwErr(""); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Passwort ändern</div>
            <div className="modal-s">Lege ein neues persönliches Passwort fest.</div>
            <div className="field"><label>Neues Passwort</label>
              <input type="password" placeholder="Mindestens 4 Zeichen" value={pw1}
                onChange={e => { setPw1(e.target.value); setPwErr(""); }} />
            </div>
            <div className="field" style={{ marginBottom: 6 }}><label>Wiederholen</label>
              <input type="password" placeholder="Bestätigen" value={pw2}
                onChange={e => { setPw2(e.target.value); setPwErr(""); }}
                onKeyDown={e => e.key === "Enter" && handleChangePw()} />
            </div>
            {pwErr && <div className="auth-error" style={{ marginTop: 8 }}>{pwErr}</div>}
            {pwSaved && <div className="saved" style={{ display: 'block', marginTop: 8 }}>✓ Passwort gespeichert</div>}
            <div className="macts" style={{ marginTop: 16 }}>
              <button className="btn-cancel" onClick={() => { setShowPwModal(false); setPw1(""); setPw2(""); setPwErr(""); }}>Abbrechen</button>
              <button className="btn-ok" disabled={!pw1 || !pw2} onClick={handleChangePw}>Speichern</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SCAN MODAL ──────────────────────────────────────────────────────────────
function ScanModal({ marketId, employees, onImport, onClose }) {
  const [image, setImage] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [matchedEmpId, setMatchedEmpId] = useState("");
  const [apiKey, setApiKey] = usePersistedState("scanApiKey", "");
  const fileRef = useRef(null);
  const mktEmps = employees.filter(e => e.marketId === marketId);

  function handleFile(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      const dataUrl = evt.target.result;
      setImage({ base64: dataUrl.split(",")[1], mediaType: file.type || "image/jpeg", dataUrl });
      setResult(null); setError("");
    };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    if (!image) return;
    setLoading(true); setError("");
    try {
      const today = new Date();
      const trimmedKey = apiKey.trim();
      if (!trimmedKey) throw new Error("Kein API-Key eingetragen.");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": trimmedKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: image.mediaType, data: image.base64 } },
            { type: "text", text: `This is a handwritten availability/schedule sheet from a retail store employee. Today is ${today.toISOString().split("T")[0]}.
Extract all availability entries and return ONLY valid JSON, no markdown, no explanation:
{
  "employeeName": "string or null",
  "entries": [
    { "date": "YYYY-MM-DD", "startTime": "HH:MM", "endTime": "HH:MM" }
  ]
}
Rules: Use current or next month for dates without a year. 24h time format. Default times 08:00–16:00 if only a date is visible with no time. Return empty entries array if nothing readable.` }
          ]}]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      if (!data.content) throw new Error("Keine Antwort vom Server.");
      const text = data.content.map(c => c.text || "").join("");
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      setResult(parsed);
      if (parsed.employeeName) {
        const first = parsed.employeeName.toLowerCase().split(" ")[0];
        const match = mktEmps.find(e => e.name.toLowerCase().split(" ")[0] === first || e.name.toLowerCase().includes(first));
        if (match) setMatchedEmpId(String(match.id));
      }
    } catch (err) {
      setError("Auslesen fehlgeschlagen. Bitte nochmal versuchen. (" + err.message + ")");
    }
    setLoading(false);
  }

  function handleImport() {
    if (!result || !matchedEmpId) return;
    onImport(parseInt(matchedEmpId), result.entries);
    onClose();
  }

  return (
    <div className="ov" onClick={onClose}>
      <div className="modal" style={{ width: "min(480px, calc(100vw - 32px))", maxHeight: "88vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
        <div className="modal-t">📷 Zettel scannen</div>
        <div className="modal-s">Foto vom handgeschriebenen Verfügbarkeitszettel — KI liest die Zeiten automatisch aus.</div>

        <div className="field" style={{ marginBottom: 14 }}>
          <label>Anthropic API-Key <span style={{ fontWeight: 400, color: "#94A3B8", textTransform: "none" }}>(wird nur lokal gespeichert)</span></label>
          <input type="password" placeholder="sk-ant-…" value={apiKey} onChange={e => setApiKey(e.target.value)} style={{ fontFamily: "monospace" }} />
        </div>

        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={handleFile} />

        {!image ? (
          <div className="scan-drop" onClick={() => fileRef.current?.click()}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📷</div>
            <div>Kamera öffnen oder Bild auswählen</div>
            <div style={{ fontSize: 12, marginTop: 4, color: "#CBD5E1" }}>Auf Mobilgeräten öffnet sich direkt die Kamera</div>
          </div>
        ) : (
          <>
            <img src={image.dataUrl} alt="Scan" style={{ width: "100%", borderRadius: 10, marginBottom: 12, border: "1.5px solid #E2E8F0", display: "block" }} />
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              <button className="btn-cancel" style={{ flex: 1 }} onClick={() => { setImage(null); setResult(null); setError(""); }}>
                🔄 Neu aufnehmen
              </button>
              <button className="btn-ok" style={{ flex: 1 }} onClick={analyze} disabled={loading}>
                {loading ? <><span className="spin">⟳</span> Wird ausgelesen…</> : "🔍 Auslesen"}
              </button>
            </div>
          </>
        )}

        {error && <div className="auth-error" style={{ marginBottom: 14 }}>{error}</div>}

        {result && <>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: "#475569", marginBottom: 8 }}>
            Erkannte Daten ({result.entries?.length ?? 0} Einträge)
          </div>

          {result.employeeName && (
            <div style={{ fontSize: 13, color: "#64748B", marginBottom: 10 }}>
              Name auf Zettel: <strong style={{ color: "#1E293B" }}>{result.employeeName}</strong>
            </div>
          )}

          <div className="field" style={{ marginBottom: 14 }}>
            <label>Mitarbeiter zuordnen</label>
            <select value={matchedEmpId} onChange={e => setMatchedEmpId(e.target.value)}>
              <option value="">Mitarbeiter wählen…</option>
              {mktEmps.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>

          <div style={{ background: "#F8FAFC", borderRadius: 10, padding: "8px 14px", marginBottom: 16, maxHeight: 200, overflowY: "auto" }}>
            {result.entries?.length > 0
              ? result.entries.map((e, i) => (
                <div key={e.date + e.startTime + i} className="scan-entry">
                  <span className="k">{e.date}</span>
                  <span className="v">{e.startTime} – {e.endTime} Uhr</span>
                </div>
              ))
              : <div style={{ fontSize: 13, color: "#94A3B8", padding: "8px 0" }}>Keine Einträge erkannt — anderes Foto versuchen.</div>
            }
          </div>

          <div className="macts">
            <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
            <button className="btn-ok" disabled={!matchedEmpId || !result.entries?.length} onClick={handleImport}>
              ✓ Übernehmen ({result.entries?.length ?? 0})
            </button>
          </div>
        </>}

        {!result && !loading && (
          <div className="macts" style={{ marginTop: image ? 0 : 8 }}>
            <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── LIEFERTAGE MODAL ────────────────────────────────────────────────────────
function DeliveryModal({ config, onSave, onClose }) {
  const [types, setTypes] = useState(config?.types || []);
  const [exceptions, setExceptions] = useState(config?.exceptions || []);
  const [newName, setNewName] = useState("");
  const [newDate, setNewDate] = useState("");
  const [newNote, setNewNote] = useState("");

  function addType() {
    if (!newName.trim()) return;
    const color = TYPE_COLORS[types.length % TYPE_COLORS.length];
    setTypes(t => [...t, { id: uid(), name: newName.trim(), color, days: [] }]);
    setNewName("");
  }

  function updateType(id, patch) {
    setTypes(t => t.map(x => x.id === id ? { ...x, ...patch } : x));
  }

  function toggleDay(id, i) {
    setTypes(t => t.map(x => x.id === id
      ? { ...x, days: x.days.includes(i) ? x.days.filter(d => d !== i) : [...x.days, i].sort((a,b)=>a-b) }
      : x));
  }


  function addException() {
    if (!newDate) return;
    setExceptions(e => [...e.filter(x => x.date !== newDate), { date: newDate, note: newNote }]
      .sort((a, b) => a.date.localeCompare(b.date)));
    setNewDate(""); setNewNote("");
  }

  const pill = (color, active) => ({
    padding: "5px 10px", borderRadius: 7, border: "1.5px solid",
    borderColor: active ? color : "#E2E8F0",
    background: active ? color + "22" : "#fff",
    color: active ? color : "#94A3B8",
    fontWeight: 700, fontSize: 12, cursor: "pointer", transition: "all .1s",
  });

  return (
    <div className="ov" onClick={onClose}>
      <div className="modal" style={{ width: "min(560px, calc(100vw - 24px))", maxHeight: "90vh", overflowY: "auto" }}
        onClick={e => e.stopPropagation()}>
        <div className="modal-t">🚚 Liefertage konfigurieren</div>
        <div className="modal-s">Lege Lieferarten mit eigenen Namen an und bestimme, an welchen Tagen sie stattfinden.</div>

        {/* ── Lieferarten ── */}
        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#475569", marginBottom: 10 }}>Lieferarten</div>

        {types.length === 0 && (
          <div style={{ fontSize: 13, color: "#94A3B8", marginBottom: 14, padding: "10px 0" }}>Noch keine Lieferart angelegt.</div>
        )}

        {types.map(t => (
          <div key={t.id} style={{ background: "#F8FAFC", borderRadius: 10, padding: "12px 14px", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <label title="Farbe wählen" style={{ position: "relative", width: 24, height: 24, flexShrink: 0, cursor: "pointer" }}>
                <input type="color" value={t.color} onChange={e => updateType(t.id, { color: e.target.value })}
                  style={{ position: "absolute", opacity: 0, width: "100%", height: "100%", cursor: "pointer" }} />
                <div style={{ width: 24, height: 24, borderRadius: "50%", background: t.color, border: "2px solid white", boxShadow: "0 0 0 1.5px " + t.color }} />
              </label>
              <input value={t.name} onChange={e => updateType(t.id, { name: e.target.value })}
                style={{ flex: 1, border: "1.5px solid #E2E8F0", borderRadius: 7, padding: "6px 10px", fontSize: 14, fontWeight: 600, color: "#1E293B", outline: "none", background: "white" }} />
              <button onClick={() => setTypes(t2 => t2.filter(x => x.id !== t.id))}
                style={{ background: "none", border: "none", color: "#CBD5E1", fontSize: 18, cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {DAY_NAMES.map((d, i) => (
                <button key={i} onClick={() => toggleDay(t.id, i)} style={pill(t.color, t.days.includes(i))}>{d}</button>
              ))}
            </div>
          </div>
        ))}

        <div style={{ display: "flex", gap: 8, marginBottom: 22 }}>
          <input type="text" placeholder="Name der Lieferart, z.B. Frischware…"
            value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addType()}
            style={{ flex: 1, padding: "9px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontSize: 14, outline: "none" }} />
          <button className="btn-ok" style={{ padding: "9px 16px", whiteSpace: "nowrap" }} disabled={!newName.trim()} onClick={addType}>+ Anlegen</button>
        </div>

        {/* ── Ausnahmen ── */}
        <div style={{ borderTop: "1px solid #F1F5F9", paddingTop: 18, marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#475569" }}>Ausnahmen ⚠️</div>
            <button onClick={() => {
              const yr = new Date().getFullYear();
              const feiertage = [...getHessenHolidays(yr), ...getHessenHolidays(yr + 1)];
              setExceptions(ex => [...ex.filter(e => !feiertage.some(f => f.date === e.date)), ...feiertage]
                .sort((a,b) => a.date.localeCompare(b.date)));
            }} style={{ fontSize: 11, color: "#16A34A", background: "#F0FDF4", border: "1px solid #86EFAC", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontWeight: 600 }}>
              ↺ Hessen-Feiertage
            </button>
          </div>

          {exceptions.length > 0 && (
            <div style={{ background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 10, padding: "4px 12px", marginBottom: 12, maxHeight: 180, overflowY: "auto" }}>
              {exceptions.map(ex => (
                <div key={ex.date} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #FEF3C7" }}>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: "#92400E" }}>{ex.date}</span>
                    {ex.note && <span style={{ fontSize: 12, color: "#B45309", marginLeft: 8 }}>{ex.note}</span>}
                  </div>
                  <button onClick={() => setExceptions(e => e.filter(x => x.date !== ex.date))}
                    style={{ background: "none", border: "none", color: "#D97706", cursor: "pointer", fontSize: 16, padding: "0 4px" }}>×</button>
                </div>
              ))}
            </div>
          )}

          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div className="field" style={{ flex: "0 0 148px", marginBottom: 0 }}>
              <label>Datum</label>
              <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} />
            </div>
            <div className="field" style={{ flex: 1, minWidth: 110, marginBottom: 0 }}>
              <label>Grund (optional)</label>
              <input type="text" placeholder="z.B. Feiertag" value={newNote}
                onChange={e => setNewNote(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addException()} />
            </div>
            <button className="btn-ok" style={{ padding: "10px 14px", whiteSpace: "nowrap", flexShrink: 0 }}
              disabled={!newDate} onClick={addException}>+ Hinzufügen</button>
          </div>
        </div>

        <div className="macts" style={{ marginTop: 18 }}>
          <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
          <button className="btn-ok" onClick={() => { onSave({ types, exceptions }); onClose(); }}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── ROLLEN MODAL ────────────────────────────────────────────────────────────
function RolesModal({ roles, thresholds: initThresholds, marketHours: initMh, onSave, onClose }) {
  const [list, setList] = useState(roles.map(r => ({ targetHours: {}, dayOverrides: {}, ...r, minStaff: undefined })));
  const [newName, setNewName] = useState("");
  const [thr, setThr] = useState(initThresholds ?? { ...DEFAULT_THRESHOLDS });
  const [mh, setMh] = useState(initMh ?? { ...DEFAULT_MARKET_HOURS });
  const [expandedRole, setExpandedRole] = useState(null);
  const [showSchichtzeiten, setShowSchichtzeiten] = useState(false);
  const [showMarktzeiten, setShowMarktzeiten] = useState(false);

  function addRole() {
    if (!newName.trim()) return;
    const color = ROLE_COLORS[list.length % ROLE_COLORS.length];
    setList(l => [...l, { id: uid(), name: newName.trim(), color, targetHours: {}, dayOverrides: {} }]);
    setNewName("");
  }

  function setHours(id, typ, val) {
    const n = parseInt(val);
    setList(l => l.map(x => x.id === id ? { ...x, targetHours: { ...x.targetHours, [typ]: isNaN(n) || n < 0 ? 0 : n } } : x));
  }

  function setDayOverride(id, dow, field, val) {
    const n = parseInt(val);
    setList(l => l.map(x => {
      if (x.id !== id) return x;
      const prev = x.dayOverrides?.[dow] ?? {};
      const updated = { ...prev, [field]: isNaN(n) || n < 0 ? 0 : n };
      return { ...x, dayOverrides: { ...x.dayOverrides, [dow]: updated } };
    }));
  }

  const DAY_LABELS = ["Mo", "Di", "Mi", "Do", "Fr", "Sa"];
  const DAY_NUMS   = [1, 2, 3, 4, 5, 6];

  const inputStyle = { width: 54, padding: "4px 6px", border: "1.5px solid #BFDBFE", borderRadius: 6, fontSize: 12, fontWeight: 700, textAlign: "center", outline: "none", background: "#EFF6FF", color: "#1D4ED8" };

  return (
    <div className="ov" onClick={onClose}>
      <div className="modal" style={{ width: "min(640px, calc(100vw - 16px))", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
        <div className="modal-t">👷 Abteilungen / Rollen</div>
        <div className="modal-s">Lege Abteilungen und die Soll-Stunden pro Schichttyp (Früh/Mittel/Spät) pro Woche fest.</div>

        {/* Marktzeiten — ausklappbar */}
        <div style={{ background: "#F0F9FF", borderRadius: 10, marginBottom: 8, border: "1px solid #BAE6FD", overflow: "hidden" }}>
          <button onClick={() => setShowMarktzeiten(v => !v)}
            style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "none", border: "none", cursor: "pointer" }}>
            <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: "#0EA5E9" }}>🏪 Marktzeiten</span>
            <span style={{ fontSize: 13, color: "#0EA5E9", fontWeight: 700 }}>{showMarktzeiten ? "▲" : "▼"}</span>
          </button>
          {showMarktzeiten && (
            <div style={{ padding: "0 14px 12px", display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 12, color: "#475569", fontWeight: 600 }}>Öffnet</span>
                <input type="time" value={mh.open} onChange={e => setMh(m => ({ ...m, open: e.target.value }))}
                  style={{ padding: "4px 8px", border: "1.5px solid #BAE6FD", borderRadius: 6, fontSize: 13, outline: "none" }} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 12, color: "#475569", fontWeight: 600 }}>Schließt</span>
                <input type="time" value={mh.close} onChange={e => setMh(m => ({ ...m, close: e.target.value }))}
                  style={{ padding: "4px 8px", border: "1.5px solid #BAE6FD", borderRadius: 6, fontSize: 13, outline: "none" }} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 10, fontWeight: 700, background: "#0F172A", color: "#fff", borderRadius: 4, padding: "1px 5px" }}>ML</span>
                <span style={{ fontSize: 12, color: "#475569", fontWeight: 600 }}>ab</span>
                <input type="time" value={mh.managerStart} onChange={e => setMh(m => ({ ...m, managerStart: e.target.value }))}
                  style={{ padding: "4px 8px", border: "1.5px solid #BAE6FD", borderRadius: 6, fontSize: 13, outline: "none" }} />
                <span style={{ fontSize: 12, color: "#475569", fontWeight: 600 }}>bis</span>
                <input type="time" value={mh.managerEnd} onChange={e => setMh(m => ({ ...m, managerEnd: e.target.value }))}
                  style={{ padding: "4px 8px", border: "1.5px solid #BAE6FD", borderRadius: 6, fontSize: 13, outline: "none" }} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 12, color: "#475569", fontWeight: 600 }}>Gesamt-Soll</span>
                <input type="number" min="0" max="9999" placeholder="z.B. 300"
                  value={mh.totalTargetHours || ""}
                  onChange={e => { const n = parseInt(e.target.value); setMh(m => ({ ...m, totalTargetHours: isNaN(n) ? 0 : n })); }}
                  style={{ padding: "4px 8px", border: "1.5px solid #BFDBFE", borderRadius: 6, fontSize: 13, outline: "none", width: 80, background: "#EFF6FF", color: "#1D4ED8", fontWeight: 700 }} />
                <span style={{ fontSize: 12, color: "#475569" }}>h/Woche</span>
              </div>
            </div>
          )}
        </div>

        {/* Schichtzeiten — ausklappbar */}
        <div style={{ background: "#F8FAFC", borderRadius: 10, marginBottom: 14, border: "1px solid #E2E8F0", overflow: "hidden" }}>
          <button onClick={() => setShowSchichtzeiten(v => !v)}
            style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "none", border: "none", cursor: "pointer" }}>
            <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: "#64748B" }}>⏰ Schichtzeiten</span>
            <span style={{ fontSize: 13, color: "#64748B", fontWeight: 700 }}>{showSchichtzeiten ? "▲" : "▼"}</span>
          </button>
          {showSchichtzeiten && (
            <div style={{ padding: "0 14px 12px" }}>
              {[
                { label: "Früh",   color: "#DBEAFE", tc: "#1D4ED8", sk: "fruehStart",  ek: "fruehEnd"  },
                { label: "Mittel", color: "#D1FAE5", tc: "#065F46", sk: "mittelStart", ek: "mittelEnd" },
                { label: "Spät",   color: "#FEE2E2", tc: "#991B1B", sk: "spaetStart",  ek: "spaetEnd"  },
              ].map(({ label, color, tc, sk, ek }) => (
                <div key={sk} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: tc, background: color, borderRadius: 5, padding: "2px 8px", minWidth: 44, textAlign: "center" }}>{label}</span>
                  <span style={{ fontSize: 12, color: "#64748B" }}>von</span>
                  <input type="time" value={thr[sk] ?? ""} onChange={e => setThr(t => ({ ...t, [sk]: e.target.value }))}
                    style={{ padding: "4px 8px", border: "1.5px solid #E2E8F0", borderRadius: 6, fontSize: 13, outline: "none" }} />
                  <span style={{ fontSize: 12, color: "#64748B" }}>bis</span>
                  <input type="time" value={thr[ek] ?? ""} onChange={e => setThr(t => ({ ...t, [ek]: e.target.value }))}
                    style={{ padding: "4px 8px", border: "1.5px solid #E2E8F0", borderRadius: 6, fontSize: 13, outline: "none" }} />
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Tabellen-Header + Zeilen: horizontal scrollbar auf Mobile */}
        <div className="roles-tbl"><div className="roles-tbl-inner">
        {list.length > 0 && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 54px 54px 54px 54px 34px 24px", gap: 6, padding: "4px 0 6px", borderBottom: "2px solid #E2E8F0", marginBottom: 4 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase" }}>Abteilung</span>
            {["Früh", "Mittel", "Spät"].map(t => (
              <span key={t} style={{ fontSize: 11, fontWeight: 700, color: "#1D4ED8", textTransform: "uppercase", textAlign: "center" }}>{t}<br/><span style={{ fontWeight: 400, textTransform: "none" }}>h/Tag</span></span>
            ))}
            <span style={{ fontSize: 11, fontWeight: 700, color: "#059669", textTransform: "uppercase", textAlign: "center" }}>Ges.<br/><span style={{ fontWeight: 400, textTransform: "none" }}>h/Tag</span></span>
            <span style={{ fontSize: 11, color: "#94A3B8", textAlign: "center" }}>↕</span>
            <span />
          </div>
        )}

        {list.length === 0 && <div style={{ fontSize: 13, color: "#94A3B8", padding: "8px 0 14px" }}>Noch keine Abteilungen angelegt.</div>}

        {list.map(r => {
          const isOpen = expandedRole === r.id;
          const hasOverrides = Object.keys(r.dayOverrides ?? {}).length > 0;
          return (
          <div key={r.id} style={{ borderBottom: "1px solid #F1F5F9" }}>
            {/* Hauptzeile */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 54px 54px 54px 54px 34px 24px", gap: 6, alignItems: "center", padding: "7px 0" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                <label title="Farbe wählen" style={{ position: "relative", width: 22, height: 22, flexShrink: 0, cursor: "pointer" }}>
                  <input type="color" value={r.color} onChange={e => setList(l => l.map(x => x.id === r.id ? { ...x, color: e.target.value } : x))}
                    style={{ position: "absolute", opacity: 0, width: "100%", height: "100%", cursor: "pointer" }} />
                  <div style={{ width: 22, height: 22, borderRadius: "50%", background: r.color, border: "2px solid white", boxShadow: "0 0 0 1.5px " + r.color }} />
                </label>
                <input value={r.name} onChange={e => setList(l => l.map(x => x.id === r.id ? { ...x, name: e.target.value } : x))}
                  style={{ flex: 1, border: "1.5px solid #E2E8F0", borderRadius: 7, padding: "5px 8px", fontSize: 13, fontWeight: 600, color: "#1E293B", outline: "none", background: "white", minWidth: 0 }} />
              </div>
              {["Früh", "Mittel", "Spät"].map(typ => (
                <input key={typ} type="number" min="0" max="999" placeholder="–"
                  value={(r.targetHours?.[typ] ?? "") === 0 ? "" : (r.targetHours?.[typ] ?? "")}
                  onChange={e => setHours(r.id, typ, e.target.value)}
                  style={inputStyle} />
              ))}
              <input type="number" min="0" max="999" placeholder="–"
                value={(r.dailyTargetHours ?? "") === 0 ? "" : (r.dailyTargetHours ?? "")}
                onChange={e => { const n = parseInt(e.target.value); setList(l => l.map(x => x.id === r.id ? { ...x, dailyTargetHours: isNaN(n) || n < 0 ? 0 : n } : x)); }}
                style={{ ...inputStyle, borderColor: "#A7F3D0", background: "#ECFDF5", color: "#059669" }} />
              <button onClick={() => setExpandedRole(isOpen ? null : r.id)}
                title="Tagesabhängige Soll-Stunden"
                style={{ background: hasOverrides ? "#FFF7ED" : "#F8FAFC", border: "1.5px solid " + (hasOverrides ? "#FED7AA" : "#E2E8F0"), color: hasOverrides ? "#EA580C" : "#94A3B8", borderRadius: 6, fontSize: 13, cursor: "pointer", padding: "4px 6px", fontWeight: 700 }}>
                {isOpen ? "▲" : "▼"}
              </button>
              <button onClick={() => setList(l => l.filter(x => x.id !== r.id))}
                style={{ background: "none", border: "none", color: "#CBD5E1", fontSize: 18, cursor: "pointer", padding: "0 2px", lineHeight: 1 }}>×</button>
            </div>
            {/* Ausklapp-Reiter: Tagesabhängige Werte */}
            {isOpen && (
              <div style={{ background: "#FFFBEB", border: "1.5px solid #FED7AA", borderRadius: 10, padding: "10px 12px", marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#92400E", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>
                  Tagesabhängige Soll-Stunden — {r.name}
                  <span style={{ fontWeight: 400, marginLeft: 8, color: "#B45309", textTransform: "none" }}>Leer = Standard-Wert oben gilt</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "40px 60px 60px 60px 60px", gap: 6, marginBottom: 6 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#92400E" }}>Tag</span>
                  {["Früh h", "Mittel h", "Spät h", "Ges. h"].map(h => (
                    <span key={h} style={{ fontSize: 11, fontWeight: 700, color: "#92400E", textAlign: "center" }}>{h}</span>
                  ))}
                </div>
                {DAY_NUMS.map((dow, i) => {
                  const ov = r.dayOverrides?.[dow] ?? {};
                  return (
                    <div key={dow} style={{ display: "grid", gridTemplateColumns: "40px 60px 60px 60px 60px", gap: 6, alignItems: "center", marginBottom: 4 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#78350F" }}>{DAY_LABELS[i]}</span>
                      {["Früh", "Mittel", "Spät"].map(typ => (
                        <input key={typ} type="number" min="0" max="999" placeholder={r.targetHours?.[typ] || "–"}
                          value={(ov[typ] ?? "") === 0 ? "" : (ov[typ] ?? "")}
                          onChange={e => setDayOverride(r.id, dow, typ, e.target.value)}
                          style={{ ...inputStyle, borderColor: "#FDE68A", background: "#FFFDE7", color: "#78350F", width: "100%" }} />
                      ))}
                      <input type="number" min="0" max="999" placeholder={r.dailyTargetHours || "–"}
                        value={(ov.total ?? "") === 0 ? "" : (ov.total ?? "")}
                        onChange={e => setDayOverride(r.id, dow, "total", e.target.value)}
                        style={{ ...inputStyle, borderColor: "#A7F3D0", background: "#ECFDF5", color: "#059669", width: "100%" }} />
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          );
        })}
        </div></div>{/* end roles-tbl */}

        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <input type="text" placeholder="Neue Rolle, z.B. Frischetheke…"
            value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addRole()}
            style={{ flex: 1, padding: "9px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontSize: 14, outline: "none" }} />
          <button className="btn-ok" style={{ padding: "9px 16px", whiteSpace: "nowrap" }} disabled={!newName.trim()} onClick={addRole}>+ Anlegen</button>
        </div>

        <div className="macts" style={{ marginTop: 18 }}>
          <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
          <button className="btn-ok" onClick={() => { onSave(list, thr, mh); onClose(); }}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── EINTRAGEFRIST MODAL (pro Markt, mit Mini-Kalender) ──────────────────────
function DeadlineModal({ deadlineDaysByMarket, onSave, onClose }) {
  const [days, setDays] = useState(() =>
    Object.fromEntries(MARKETS.map(m => [m.id, deadlineDaysByMarket?.[m.id] ?? DEFAULT_DEADLINE_DAYS]))
  );
  const [calMarket, setCalMarket] = useState(MARKETS[0].id);

  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const monthLabel = now.toLocaleDateString("de-DE", { month: "long", year: "numeric" });
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() + 6) % 7; // Mo=0 .. So=6
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = fmtISO(now);

  const currentDays = days[calMarket] ?? DEFAULT_DEADLINE_DAYS;
  const isDeadlineDay = d => (d.getDay() + currentDays) % 7 === 1; // Tag X vor Montag

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let day = 1; day <= daysInMonth; day++) cells.push(new Date(year, month, day));

  return (
    <div className="ov" onClick={onClose}>
      <div className="modal" style={{ width: "min(440px, calc(100vw - 24px))", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
        <div className="modal-t">⏱️ Eintragefrist</div>
        <div className="modal-s">Wie viele Tage vor Wochenbeginn (Montag) endet die Frist für Mitarbeiter, ihre Verfügbarkeit einzutragen? Pro Markt einstellbar. Standard: {DEFAULT_DEADLINE_DAYS} Tage (Mittwoch 23:59 der Vorwoche).</div>

        {MARKETS.map(m => (
          <div key={m.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, padding: "6px 0", borderBottom: "1px solid #F1F5F9" }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#1E293B", cursor: "pointer", textDecoration: calMarket === m.id ? "underline" : "none" }}
              onClick={() => setCalMarket(m.id)}>{m.name}</span>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <input type="number" min="0" max="21" value={days[m.id] ?? DEFAULT_DEADLINE_DAYS}
                onChange={e => { const n = parseInt(e.target.value); setDays(p => ({ ...p, [m.id]: isNaN(n) || n < 0 ? 0 : n })); setCalMarket(m.id); }}
                style={{ width: 56, padding: "4px 6px", border: "1.5px solid #E2E8F0", borderRadius: 6, fontSize: 12, fontWeight: 700, textAlign: "center", outline: "none" }} />
              <span style={{ fontSize: 11, color: "#94A3B8" }}>Tage</span>
            </div>
          </div>
        ))}

        {/* Mini-Kalender: zeigt die Fristtage des gewählten Markts im aktuellen Monat */}
        <div style={{ marginTop: 14, background: "#F8FAFC", borderRadius: 10, padding: "12px 14px" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", marginBottom: 8, textTransform: "capitalize" }}>
            {monthLabel} — Fristtage für {MARKETS.find(m => m.id === calMarket)?.name}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3, marginBottom: 4 }}>
            {["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"].map(d => (
              <span key={d} style={{ fontSize: 10, fontWeight: 700, color: "#94A3B8", textAlign: "center" }}>{d}</span>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
            {cells.map((d, i) => {
              if (!d) return <span key={i} />;
              const isToday = fmtISO(d) === todayStr;
              const isDeadline = isDeadlineDay(d);
              return (
                <div key={i} style={{
                  aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 11, fontWeight: isDeadline ? 800 : 500, borderRadius: 6,
                  background: isDeadline ? "#FEE2E2" : "transparent",
                  color: isDeadline ? "#DC2626" : "#1E293B",
                  border: isToday ? "1.5px solid #3B82F6" : "1.5px solid transparent",
                }}>{d.getDate()}</div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 11, color: "#64748B" }}>
            <span><span style={{ display: "inline-block", width: 9, height: 9, borderRadius: 3, background: "#FEE2E2", border: "1px solid #FCA5A5", marginRight: 4, verticalAlign: "middle" }} />Fristtag, 23:59 Uhr</span>
            <span><span style={{ display: "inline-block", width: 9, height: 9, borderRadius: 3, border: "1.5px solid #3B82F6", marginRight: 4, verticalAlign: "middle" }} />Heute</span>
          </div>
        </div>

        <div className="macts" style={{ marginTop: 16 }}>
          <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
          <button className="btn-ok" onClick={() => { onSave(days); onClose(); }}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── MARKTLEITUNG-ANSICHT ─────────────────────────────────────────────────────
function ManagerView({ marketId, onMarketChange, isAdmin, employees, availability, shifts, weekStart, weekDates, onWeekChange, onAddShift, onDelShift, onAddEmployee, onDeleteEmployee, onUpdateEmployee, onImportAvailability, deliveryConfig, onUpdateDelivery, roles, thresholds, marketHours, onUpdateRoles, onUpdateMarketHours, onBulkAddShifts, onLogout, onResetData, managerCreds, onUpdateManagerCreds, deadlineDaysByMarket, onUpdateDeadlineDaysByMarket }) {
  const [sbOpen, setSbOpen] = useState(false);
  const [modal, setModal] = useState(null);
  const [delEmpModal, setDelEmpModal] = useState(null);
  const [showAddEmp, setShowAddEmp] = useState(false);
  const [showScan, setShowScan] = useState(false);
  const [showDelivery, setShowDelivery] = useState(false);
  const [showRoles, setShowRoles] = useState(false);
  const [showManagerPw, setShowManagerPw] = useState(false);
  const [showDeadline, setShowDeadline] = useState(false);
  const [tlDay, setTlDay] = useState(() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; });
  const [tlRole, setTlRole] = useState(null); // null = alle Abteilungen
  const [newEmpName, setNewEmpName] = useState("");
  const [newEmpPw, setNewEmpPw] = useState("");
  const [newEmpHours, setNewEmpHours] = useState("");
  const [newEmpRoles, setNewEmpRoles] = useState([]);
  const [editEmp, setEditEmp] = useState(null); // { id, name, weeklyHours, defaultRoles }
  const [autoPlanProposal, setAutoPlanProposal] = useState([]);
  const [editProposal, setEditProposal] = useState(null); // { shift, empName }

  const mktEmps = useMemo(() => employees.filter(e => e.marketId === marketId).sort((a, b) => (b.isMarktleiter ? 1 : 0) - (a.isMarktleiter ? 1 : 0)), [employees, marketId]);
  const weekStrs = useMemo(() => weekDates.map(fmtISO), [weekDates]);
  const mktEmpIdSet = useMemo(() => new Set(mktEmps.map(e => e.id)), [mktEmps]);
  const roleByName = useMemo(() => Object.fromEntries(roles.map(r => [r.name, r])), [roles]);

  const availMap = useMemo(() => {
    const m = {}; availability.forEach(a => { m[`${a.employeeId}:${a.date}`] = a; }); return m;
  }, [availability]);

  const shiftMap = useMemo(() => {
    const m = {}; shifts.forEach(s => { m[`${s.employeeId}:${s.date}`] = s; }); return m;
  }, [shifts]);

  const proposalMap = useMemo(() => {
    const m = {}; autoPlanProposal.forEach(s => { m[`${s.employeeId}:${s.date}`] = s; }); return m;
  }, [autoPlanProposal]);

  function calcHours(start, end) {
    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);
    return Math.round(((eh * 60 + em) - (sh * 60 + sm)) / 60 * 10) / 10;
  }

  const { totalAvail, totalShifts, totalIstHours } = useMemo(() => {
    const weekSet = new Set(weekStrs);
    const weekShifts = shifts.filter(s => mktEmpIdSet.has(s.employeeId) && weekSet.has(s.date));
    return {
      totalAvail: availability.filter(a => mktEmpIdSet.has(a.employeeId) && weekSet.has(a.date)).length,
      totalShifts: weekShifts.length,
      totalIstHours: weekShifts.reduce((sum, s) => sum + calcHours(s.startTime, s.endTime), 0),
    };
  }, [shifts, availability, mktEmpIdSet, weekStrs]);

  const market = MARKETS.find(m => m.id === marketId);
  const [shiftStart, setShiftStart] = useState("");
  const [shiftEnd, setShiftEnd] = useState("");
  const [shiftRoles, setShiftRoles] = useState([]);
  const [timeErr, setTimeErr] = useState("");

  function addEmp() {
    if (!newEmpName.trim() || !newEmpPw) return;
    onAddEmployee(newEmpName.trim(), newEmpPw, newEmpHours ? parseInt(newEmpHours) : null, newEmpRoles);
    setShowAddEmp(false); setNewEmpName(""); setNewEmpPw(""); setNewEmpHours(""); setNewEmpRoles([]);
  }

  function toggleNewEmpRole(rname) {
    setNewEmpRoles(prev => prev.includes(rname) ? prev.filter(r => r !== rname) : [...prev, rname]);
  }

  function saveEditEmp() {
    if (!editEmp) return;
    const changes = { weeklyHours: editEmp.weeklyHours ? parseInt(editEmp.weeklyHours) : null, defaultRoles: editEmp.defaultRoles ?? [], isMarktleiter: !!editEmp.isMarktleiter, isSchliessKraft: !!editEmp.isSchliessKraft };
    if (editEmp.newPassword?.trim()) { changes.password = editEmp.newPassword.trim(); changes.mustChangePw = true; }
    onUpdateEmployee(editEmp.id, changes);
    setEditEmp(null);
  }

  function openCell(emp, ds) {
    const av = availMap[`${emp.id}:${ds}`];
    const sh = shiftMap[`${emp.id}:${ds}`];
    setShiftStart(sh?.startTime ?? av?.startTime ?? "08:00");
    setShiftEnd(sh?.endTime ?? av?.endTime ?? "16:00");
    setShiftRoles(sh ? (sh.roles ?? (sh.role ? [sh.role] : [])) : []);
    setTimeErr("");
    setModal({ emp, date: ds, av, sh });
  }

  function toggleRole(name) {
    setShiftRoles(prev => prev.includes(name) ? prev.filter(r => r !== name) : [...prev, name]);
  }

  function confirmShift() {
    const av = modal.av;
    if (shiftStart >= shiftEnd) { setTimeErr("Startzeit muss vor Endzeit liegen."); return; }
    if (av && (shiftStart < av.startTime || shiftEnd > av.endTime)) {
      setTimeErr(`Zeiten müssen innerhalb der Verfügbarkeit ${av.startTime}–${av.endTime} liegen.`);
      return;
    }
    if (modal.sh) onDelShift(modal.sh.id);
    onAddShift({ employeeId: modal.emp.id, date: modal.date, startTime: shiftStart, endTime: shiftEnd, roles: shiftRoles });
    setModal(null);
  }

  return (
    <div className="app">
      
      <div className="mob-bar">
        <button className="burger" onClick={() => setSbOpen(true)}>☰</button>
        <span className="mob-logo">Markt<b>Plan</b></span>
        <button className="mob-logout" onClick={onLogout}>Abmelden</button>
      </div>
      {sbOpen && <div className="sb-overlay" onClick={() => setSbOpen(false)} />}
      <Sidebar role={isAdmin ? "admin" : "manager"} marketId={marketId} isAdmin={isAdmin}
        onMarketChange={id => { onMarketChange(id); setSbOpen(false); }}
        onLogout={onLogout} sbOpen={sbOpen} onClose={() => setSbOpen(false)}
        onShowDelivery={() => setShowDelivery(true)}
        onShowScan={() => setShowScan(true)}
        onShowAddEmp={() => setShowAddEmp(true)}
        onShowRoles={() => setShowRoles(true)}
        onShowManagerPw={isAdmin ? () => setShowManagerPw(true) : null}
        onShowDeadline={isAdmin ? () => setShowDeadline(true) : null}
        onResetData={onResetData} />
      <div className="main">
        <div className="ph">
          <div className="ph-left">
            <div className="ph-title">{market?.name ?? "Markt wählen"}</div>
            <div className="ph-sub">Schichtplan verwalten</div>
          </div>
          <button className="btn-logout-top" onClick={onLogout}>← Abmelden</button>
        </div>

        {!marketId ? (
          <div className="alert-w">Bitte links einen Markt auswählen.</div>
        ) : <>
          <div className="stats">
            <div className="stat"><div className="stat-v">{mktEmps.length}</div><div className="stat-k">Mitarbeiter</div></div>
            <div className="stat"><div className="stat-v">{totalAvail}</div><div className="stat-k">Verfügbar diese Woche</div></div>
            <div className="stat"><div className="stat-v" style={{ color: totalShifts > 0 ? "#1D4ED8" : "#0F172A" }}>{totalShifts}</div><div className="stat-k">Schichten geplant</div></div>
            <div className="stat"><div className="stat-v" style={{ color: totalIstHours >= (marketHours?.totalTargetHours ?? 0) && (marketHours?.totalTargetHours ?? 0) > 0 ? "#059669" : "#0F172A" }}>{totalIstHours}h{(marketHours?.totalTargetHours ?? 0) > 0 ? `/${marketHours.totalTargetHours}h` : ""}</div><div className="stat-k">Stunden Ist{(marketHours?.totalTargetHours ?? 0) > 0 ? "/Soll" : " geplant"}</div></div>
          </div>

          <WeekNav weekStart={weekStart} weekDates={weekDates} onChange={onWeekChange} />

          {(() => {
            const weekExceptions = weekDates
              .map((d, i) => i !== 6 ? (deliveryConfig.exceptions ?? []).find(e => e.date === fmtISO(d)) : null)
              .filter(Boolean);
            return weekExceptions.length > 0 ? (
              <div style={{ background: "#FEF2F2", border: "1.5px solid #FECACA", borderRadius: 10, padding: "12px 16px", marginBottom: 16 }}>
                <div style={{ fontWeight: 700, color: "#DC2626", fontSize: 14, marginBottom: 4 }}>
                  ⛔ Umplanung erforderlich — {weekExceptions.length} Feiertag{weekExceptions.length > 1 ? "e" : ""} diese Woche
                </div>
                <div style={{ fontSize: 13, color: "#B91C1C" }}>
                  {weekExceptions.map(ex => `${ex.date}: ${ex.note}`).join(" · ")}
                </div>
              </div>
            ) : null;
          })()}

          {/* Auto-Plan Button + Vorschlag-Banner */}
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: autoPlanProposal.length > 0 ? 0 : 6 }}>
            <button
              title="Planungsvorschlag für diese Woche erstellen"
              onClick={() => {
                const toMin = t => { const [h,m] = t.split(":").map(Number); return h*60+m; };
                const fmtT = m => `${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
                const defaultRole = roles[0]?.name ?? "";
                const thr = thresholds;
                const weekStrsLocal = weekDates.map(fmtISO);
                const weekSet = new Set(weekStrsLocal);

                // Stunden-Tracking (Mitarbeiter)
                const planned = {};
                mktEmps.forEach(e => { planned[e.id] = 0; });
                shifts.filter(s => weekSet.has(s.date) && mktEmpIdSet.has(s.employeeId))
                  .forEach(s => { planned[s.employeeId] = (planned[s.employeeId] ?? 0) + (toMin(s.endTime) - toMin(s.startTime)); });

                // Abteilungs-Soll-Stunden-Tracking pro Schichttyp (Früh/Mittel/Spät)
                // roleTargetMin[roleName][typ] = Soll-Minuten, rolePlannedMin[roleName][typ] = Ist-Minuten
                const roleTargetMin = {};
                const rolePlannedMin = {};
                // Wochensoll pro Abteilung+Typ aus Tageswerten aufbauen (Overrides berücksichtigen)
                roles.forEach(r => {
                  roleTargetMin[r.name] = {};
                  rolePlannedMin[r.name] = {};
                  TYPES.forEach(typ => {
                    const weeklyH = weekDates.reduce((sum, d) => {
                      const dow = d.getDay();
                      const ov = r.dayOverrides?.[dow] ?? {};
                      return sum + (ov[typ] ?? r.targetHours?.[typ] ?? 0);
                    }, 0);
                    if (weeklyH > 0) roleTargetMin[r.name][typ] = weeklyH * 60;
                    rolePlannedMin[r.name][typ] = 0;
                  });
                });
                shifts.filter(s => weekSet.has(s.date) && mktEmpIdSet.has(s.employeeId)).forEach(s => {
                  const dur = toMin(s.endTime) - toMin(s.startTime);
                  const typ = classifyShift(s.startTime, thr);
                  (s.roles ?? []).forEach(rn => { if (rolePlannedMin[rn]) rolePlannedMin[rn][typ] = (rolePlannedMin[rn][typ] ?? 0) + dur; });
                });

                const roleTypDeficit = (rn, typ) => (roleTargetMin[rn]?.[typ] ?? 0) - (rolePlannedMin[rn]?.[typ] ?? 0);
                const roleDeficit = rn => TYPES.reduce((s, typ) => s + Math.max(0, roleTypDeficit(rn, typ)), 0);
                const empRoleDeficit = emp => Math.max(0, ...(emp.defaultRoles ?? []).map(rn => roleDeficit(rn)));

                const mh = marketHours ?? DEFAULT_MARKET_HOURS;
                const target = e => (e.weeklyHours ?? 0) * 60;
                const priority = e => e.isMarktleiter ? -1 : e.weeklyHours >= 35 ? 0 : e.weeklyHours > 10 ? 1 : 2;
                const newShifts = [];
                const empById = new Map(mktEmps.map(e => [e.id, e]));

                const planOne = (a, emp, overrideStart, overrideEnd) => {
                  const rem = target(emp) - (planned[emp.id] ?? 0);
                  if (rem <= 0) return false;
                  const startStr = overrideStart ?? a.startTime;
                  let endMin = overrideEnd != null ? overrideEnd : toMin(a.endTime);
                  if (!emp.isMarktleiter && emp.weeklyHours <= 10) endMin = Math.min(endMin, toMin(startStr) + Math.min(rem, 300));
                  const shiftMin = endMin - toMin(startStr);
                  if (shiftMin < 60) return false;
                  const assignedRoles = (emp.defaultRoles ?? []).length > 0 ? emp.defaultRoles : [defaultRole];
                  newShifts.push({ id: uid(), employeeId: emp.id, date: a.date, startTime: startStr, endTime: fmtT(endMin), roles: assignedRoles });
                  planned[emp.id] = (planned[emp.id] ?? 0) + shiftMin;
                  const shiftTyp = classifyShift(startStr, thr);
                  assignedRoles.forEach(rn => { if (rolePlannedMin[rn]) rolePlannedMin[rn][shiftTyp] = (rolePlannedMin[rn][shiftTyp] ?? 0) + shiftMin; });
                  return true;
                };

                weekDates.forEach((d, dayIdx) => {
                  const ds = fmtISO(d);

                  // Ist heute ein Liefertag?
                  const isDeliveryDay = (deliveryConfig.types ?? []).some(t => t.days.includes(dayIdx))
                    && !(deliveryConfig.exceptions ?? []).find(e => e.date === ds);

                  const alreadyPlanned = new Set(
                    [...shifts, ...newShifts].filter(s => s.date === ds && mktEmpIdSet.has(s.employeeId)).map(s => s.employeeId)
                  );

                  const dayAvail = availability
                    .filter(a => a.date === ds && mktEmpIdSet.has(a.employeeId) && !alreadyPlanned.has(a.employeeId))
                    .map(a => ({ a, emp: empById.get(a.employeeId) }))
                    .filter(x => x.emp && target(x.emp) - (planned[x.emp.id] ?? 0) > 0);

                  const plan = (x) => { if (planOne(x.a, x.emp)) { alreadyPlanned.add(x.emp.id); return true; } return false; };
                  const avail = () => dayAvail.filter(x => !alreadyPlanned.has(x.emp.id));
                  const byPrio = (arr) => [...arr].sort((x, y) =>
                    ((x.emp.isSchliessKraft ? 0 : 1) - (y.emp.isSchliessKraft ? 0 : 1)) ||
                    priority(x.emp) - priority(y.emp) ||
                    empRoleDeficit(y.emp) - empRoleDeficit(x.emp) ||   // Abteilung mit mehr offenem Soll zuerst
                    (target(y.emp) - (planned[y.emp.id] ?? 0)) - (target(x.emp) - (planned[x.emp.id] ?? 0))
                  );

                  // ── Schritt 1: ML = Schließkraft ──
                  const mlClose = dayAvail.filter(x => x.emp.isMarktleiter)
                    .sort((x, y) => y.a.endTime.localeCompare(x.a.endTime))
                    .find(x => x.a.endTime >= mh.managerEnd);
                  if (mlClose) { planOne(mlClose.a, mlClose.emp, null, toMin(mh.managerEnd)); alreadyPlanned.add(mlClose.emp.id); }

                  const fruehEnd   = thr.fruehEnd   ?? thr.frueh ?? "11:00";
                  const spaetStart = thr.spaetStart ?? thr.spaet ?? "14:00";

                  // ── Schritt 2: Früh-SK + Spät-SK (Schließkraft bevorzugt) ──
                  const fruehSK = byPrio(avail()).find(x => x.a.startTime <= mh.open);
                  if (fruehSK) plan(fruehSK);
                  const spaetSK = byPrio(avail()).find(x => x.a.startTime >= spaetStart);
                  if (spaetSK) plan(spaetSK);

                  // ── Schritt 3: Kasse Früh + Spät sicherstellen ──
                  const kasseFrueh = byPrio(avail().filter(x => (x.emp.defaultRoles ?? []).includes("Kasse") && x.a.startTime < fruehEnd)).shift();
                  if (kasseFrueh) plan(kasseFrueh);
                  const kasseSpaet = byPrio(avail().filter(x => (x.emp.defaultRoles ?? []).includes("Kasse") && x.a.startTime >= spaetStart)).shift();
                  if (kasseSpaet) plan(kasseSpaet);

                  // ── Schritt 4: Liefertag → Mittelschicht bevorzugt auffüllen ──
                  if (isDeliveryDay) {
                    const mittelAvail = byPrio(avail().filter(x => x.a.startTime >= fruehEnd && x.a.startTime < spaetStart));
                    mittelAvail.slice(0, 2).forEach(x => plan(x));
                  }

                  // ── Schritt 5: Gleichmäßig Früh/Spät auffüllen ──
                  const dayShiftMap = new Map();
                  [...shifts, ...newShifts].filter(s => s.date === ds && mktEmpIdSet.has(s.employeeId))
                    .forEach(s => dayShiftMap.set(s.employeeId, s));
                  let cf = [...alreadyPlanned].filter(id => { const s = dayShiftMap.get(id); return s && s.startTime < fruehEnd; }).length;
                  let cs = [...alreadyPlanned].filter(id => { const s = dayShiftMap.get(id); return s && s.startTime >= spaetStart; }).length;

                  byPrio(avail()).forEach(x => {
                    if (alreadyPlanned.has(x.emp.id)) return;
                    const isFrueh = x.a.startTime < fruehEnd;
                    const isSpaet = x.a.startTime >= spaetStart;
                    const isMittel = !isFrueh && !isSpaet;
                    if (isMittel && !isDeliveryDay && cf < 2 && cs < 2) return;
                    if (isFrueh && cf > cs + 1) return;
                    if (plan(x)) { if (isFrueh) cf++; else if (isSpaet) cs++; }
                  });
                });

                if (newShifts.length === 0) {
                  alert("Keine Vorschläge möglich – alle verfügbaren Mitarbeiter sind bereits eingeplant oder haben ihre Stunden erreicht.");
                  return;
                }
                setAutoPlanProposal(newShifts);
              }}
              style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 700, background: "#3B82F6", color: "#fff", border: "none", borderRadius: 8, padding: "7px 14px", cursor: "pointer", boxShadow: "0 2px 8px rgba(59,130,246,.35)" }}
            >
              ✨ Auto-Plan
            </button>
          </div>

          {/* Vorschlag-Banner */}
          {autoPlanProposal.length > 0 && (
            <div style={{ background: "#EFF6FF", border: "1.5px solid #93C5FD", borderRadius: 10, padding: "10px 16px", marginBottom: 10, marginTop: 8, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#1D4ED8", flex: 1 }}>
                ✨ {autoPlanProposal.length} Schichten vorgeschlagen
              </span>
              <button onClick={() => { onBulkAddShifts(autoPlanProposal); setAutoPlanProposal([]); }}
                style={{ background: "#3B82F6", color: "#fff", border: "none", borderRadius: 7, padding: "6px 16px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                ✅ Übernehmen
              </button>
              <button onClick={() => { setAutoPlanProposal([]); }}
                style={{ background: "#fff", color: "#64748B", border: "1.5px solid #E2E8F0", borderRadius: 7, padding: "6px 14px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                ✖ Verwerfen
              </button>
            </div>
          )}

          <div className="grid-wrap">
            <div className="grid-head">
              <div className="gh-name">Mitarbeiter</div>
              {weekDates.map((d, i) => {
                const ds = fmtISO(d);
                const dayTypes = (deliveryConfig.types || []).filter(t => t.days.includes(i));
                const exception = deliveryConfig.exceptions.find(e => e.date === ds);
                const isSunday = i === 6;
                const showRed = exception && !isSunday;
                return (
                  <div key={i} className={`gh-day ${isToday(d) ? "today" : ""}`}
                    style={showRed ? { background: "#FEF2F2" } : undefined}>
                    <div className="gh-day-n" style={showRed ? { color: "#DC2626" } : undefined}>{DAY_NAMES[i]}</div>
                    <div className="gh-day-d" style={showRed ? { color: "#DC2626" } : undefined}>{fmtShort(d)}</div>
                    {showRed
                      ? <div title={exception.note} style={{ fontSize: 10, color: "#DC2626", fontWeight: 700, marginTop: 2, lineHeight: 1.2 }}>⛔ {exception.note}</div>
                      : exception && isSunday
                      ? <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 2, lineHeight: 1.2 }}>{exception.note}</div>
                      : dayTypes.length > 0
                      ? <div style={{ display: "flex", flexDirection: "column", gap: 2, marginTop: 3 }}>
                          {dayTypes.map(t => {
                            const covered = shifts.some(s =>
                              mktEmpIdSet.has(s.employeeId) &&
                              s.date === ds &&
                              (s.roles ? s.roles.includes(t.name) : s.role === t.name)
                            );
                            return (
                              <div key={t.id} style={{
                                fontSize: 10, fontWeight: 700, color: t.color,
                                background: t.color + "18", borderRadius: 4,
                                padding: "1px 5px", lineHeight: 1.4, whiteSpace: "nowrap",
                                overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100%",
                                display: "flex", alignItems: "center", gap: 3,
                              }}>
                                <span>🚚 {t.name}</span>
                                <span title={covered ? "Besetzt" : "Niemand eingeplant"} style={{ marginLeft: "auto", fontSize: 10 }}>
                                  {covered ? "✓" : "⚠"}
                                </span>
                              </div>
                            );
                          })}
                        </div>
                      : null}
                  </div>
                );
              })}
            </div>
            {mktEmps.length === 0
              ? <div className="empty-state">Noch keine Mitarbeiter. Klicke auf „+ Mitarbeiter anlegen".</div>
              : mktEmps.map(emp => {
                const empIst = shifts
                  .filter(s => s.employeeId === emp.id && weekStrs.includes(s.date))
                  .reduce((sum, s) => sum + calcHours(s.startTime, s.endTime), 0);
                const istColor = !emp.weeklyHours ? "#64748B" : empIst >= emp.weeklyHours ? "#059669" : "#DC2626";
                return (
                <div key={emp.id} className="grid-row">
                  <div className="gr-name">
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <span className="gr-name-text" style={{ fontWeight: 600, fontSize: 13 }}>{emp.name}</span>
                      <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
                        <span style={{ fontSize: 11, color: istColor, fontWeight: 700 }}>{empIst}h{emp.weeklyHours ? `/${emp.weeklyHours}h` : ""}</span>
                        {emp.isMarktleiter && <span style={{ fontSize: 9, fontWeight: 800, background: "#0F172A", color: "#fff", borderRadius: 4, padding: "1px 5px", letterSpacing: ".04em" }}>ML</span>}
                        {emp.isSchliessKraft && !emp.isMarktleiter && <span style={{ fontSize: 9, fontWeight: 800, background: "#0369A1", color: "#fff", borderRadius: 4, padding: "1px 5px", letterSpacing: ".04em" }}>SK</span>}
                        <button className="btn-del-emp" title="Bearbeiten" style={{ background: "#EFF6FF", color: "#3B82F6", fontSize: 11, padding: "1px 5px", borderRadius: 4 }}
                          onClick={() => setEditEmp({ id: emp.id, name: emp.name, weeklyHours: emp.weeklyHours ?? "", defaultRoles: emp.defaultRoles ?? [], isMarktleiter: emp.isMarktleiter, isSchliessKraft: emp.isSchliessKraft })}>✏️</button>
                      </div>
                    </div>
                  </div>
                  {weekDates.map((d, i) => {
                    const ds = fmtISO(d);
                    const av = availMap[`${emp.id}:${ds}`];
                    const sh = shiftMap[`${emp.id}:${ds}`];
                    const prop = !sh ? proposalMap[`${emp.id}:${ds}`] : null;

                    const renderShiftBlock = (s, isProposal) => {
                      const shRoles = s.roles ?? (s.role ? [s.role] : []);
                      const roleObjs = shRoles.map(rn => roleByName[rn]).filter(Boolean);
                      const firstRole = roleObjs[0];
                      const borderColor = isProposal ? "#3B82F6" : shRoles.length > 1 ? "#94A3B8" : firstRole?.color;
