    const { useState, useMemo, useEffect, useRef } = React;

// ─── KONSTANTEN & HELPERS ────────────────────────────────────────────────────
let _id = 400;
const uid = () => ++_id;

const MARKETS = [
  { id: 1, name: "Griesheim" },
  { id: 2, name: "Weiterstadt" },
  { id: 3, name: "Wolfskehlen" },
  { id: 4, name: "Alsbach" },
  { id: 5, name: "Kleingerau" },
];

const DAY_NAMES = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];

// ponytail: Passwörter im State als Klartext — in Produktion: Hashing + Server-Sessions
const MANAGER_CREDS = { 1: "1234", 2: "1234", 3: "1234", 4: "1234", 5: "1234" };

function getMonday(d) {
  const date = new Date(d); const day = date.getDay() || 7;
  date.setDate(date.getDate() - day + 1); date.setHours(0,0,0,0); return date;
}
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const fmtISO = d => d.toISOString().split("T")[0];
const fmtShort = d => d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
const isToday = d => fmtISO(d) === fmtISO(new Date());

// ─── HESSEN FEIERTAGE ─────────────────────────────────────────────────────────
function getEaster(year) {
  // Gaußsche Osterformel
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

function getHessenHolidays(year) {
  const e = getEaster(year);
  const shift = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
  const iso = d => fmtISO(d);
  return [
    { date: `${year}-01-01`, note: "Neujahr" },
    { date: iso(shift(e, -2)),  note: "Karfreitag" },
    { date: iso(shift(e,  1)),  note: "Ostermontag" },
    { date: `${year}-05-01`,    note: "Tag der Arbeit" },
    { date: iso(shift(e, 39)),  note: "Christi Himmelfahrt" },
    { date: iso(shift(e, 50)),  note: "Pfingstmontag" },
    { date: iso(shift(e, 60)),  note: "Fronleichnam" },
    { date: `${year}-10-03`,    note: "Tag der deutschen Einheit" },
    { date: `${year}-12-25`,    note: "1. Weihnachtstag" },
    { date: `${year}-12-26`,    note: "2. Weihnachtstag" },
  ].sort((a, b) => a.date.localeCompare(b.date));
}

const TYPE_COLORS = ["#3B82F6","#10B981","#F59E0B","#EF4444","#8B5CF6","#EC4899","#06B6D4","#84CC16"];

const ROLE_COLORS = ["#6366F1","#0EA5E9","#10B981","#F59E0B","#EF4444","#8B5CF6","#EC4899","#14B8A6"];
const DEFAULT_ROLES = [
  { id: 1, name: "Kasse",      color: "#6366F1" },
  { id: 2, name: "TS",         color: "#0EA5E9" },
  { id: 3, name: "GT",         color: "#8B5CF6" },
  { id: 4, name: "Frische",    color: "#10B981" },
  { id: 5, name: "Metzgerei",  color: "#EF4444" },
  { id: 6, name: "Bäckerei",   color: "#F59E0B" },
];

function defaultDelivery() {
  const yr = new Date().getFullYear();
  return {
    types: [
      { id: uid(), name: "TS",      color: "#0EA5E9", days: [0, 2, 4] },      // Mo, Mi, Fr
      { id: uid(), name: "Frische", color: "#10B981", days: [0, 1, 2, 3, 4] }, // Mo–Fr
      { id: uid(), name: "GT",      color: "#8B5CF6", days: [1, 3] },          // Di, Do
    ],
    exceptions: [...getHessenHolidays(yr), ...getHessenHolidays(yr + 1)],
  };
}
// Deadline: Mittwoch 23:59 der Vorwoche — danach kein Eintragen mehr für diese Woche
function getDeadline(weekStart) {
  const d = addDays(weekStart, -5); d.setHours(23, 59, 59, 999); return d;
}
const isPastDeadline = weekStart => new Date() > getDeadline(weekStart);
function getKW(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() + 4 - day);
  const y0 = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - y0) / 86400000) + 1) / 7);
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("login"); // login | employee | manager | setPassword
  const [marketId, setMarketId] = useState(null);
  const [myEmployeeId, setMyEmployeeId] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [employees, setEmployees] = useState(SEED_EMP);
  const [availability, setAvailability] = useState(mkSeedAvail());
  const [shifts, setShifts] = useState([]);
  const [weekStart, setWeekStart] = useState(getMonday(new Date()));
  const weekDates = useMemo(() => Array.from({ length: 7 }, (_, i) => addDays(weekStart, i)), [weekStart]);

  function handleLogin({ role, marketId: mId, employeeId }) {
    if (role === "admin") {
      setIsAdmin(true);
      setMarketId(1);
      setPage("manager");
    } else if (role === "employee") {
      setIsAdmin(false);
      setMarketId(mId);
      const emp = employees.find(e => e.id === employeeId);
      setMyEmployeeId(employeeId);
      setPage(emp.mustChangePw ? "setPassword" : "employee");
    } else {
      setIsAdmin(false);
      setMarketId(mId);
      setPage("manager");
    }
  }

  function handleSetPassword(newPw) {
    setEmployees(p => p.map(e => e.id === myEmployeeId ? { ...e, password: newPw, mustChangePw: false } : e));
    setPage("employee");
  }

  function handleLogout() { setPage("login"); setMarketId(null); setMyEmployeeId(null); setIsAdmin(false); }

  const saveAvailability = (empId, avails) => {
    setAvailability(prev => {
      const ws = weekDates.map(fmtISO);
      return [...prev.filter(a => !(a.employeeId === empId && ws.includes(a.date))), ...avails];
    });
  };

  const common = { employees, availability, shifts, weekStart, weekDates, onWeekChange: setWeekStart, onLogout: handleLogout };
  const [deliveryConfig, setDeliveryConfig] = useState(() =>
    Object.fromEntries(MARKETS.map(m => [m.id, defaultDelivery()]))
  );
  const [rolesConfig, setRolesConfig] = useState(() =>
    Object.fromEntries(MARKETS.map(m => [m.id, DEFAULT_ROLES.map(r => ({ ...r }))]))
  );

  if (page === "login") return <LoginScreen employees={employees} onLogin={handleLogin} />;

  if (page === "setPassword") {
    const me = employees.find(e => e.id === myEmployeeId);
    return <SetPasswordView name={me?.name} onSave={handleSetPassword} />;
  }

  if (page === "employee") {
    const me = employees.find(e => e.id === myEmployeeId);
    return (
      <EmployeeView {...common} me={me} marketId={marketId}
        onSave={avails => saveAvailability(myEmployeeId, avails)}
        onChangePassword={newPw => setEmployees(p => p.map(e => e.id === myEmployeeId ? { ...e, password: newPw } : e))}
      />
    );
  }

  return (
    <ManagerView {...common} marketId={marketId} onMarketChange={isAdmin ? setMarketId : null} isAdmin={isAdmin}
      onAddShift={s => setShifts(p => [...p, { ...s, id: uid() }])}
      onDelShift={id => setShifts(p => p.filter(s => s.id !== id))}
      onAddEmployee={(name, pw, wh) => setEmployees(p => [...p, { id: uid(), name, marketId, password: pw, mustChangePw: true, weeklyHours: wh || null }])}
      onDeleteEmployee={empId => {
        setEmployees(p => p.filter(e => e.id !== empId));
        setAvailability(p => p.filter(a => a.employeeId !== empId));
        setShifts(p => p.filter(s => s.employeeId !== empId));
      }}
      onImportAvailability={(empId, entries) => {
        const dates = entries.map(e => e.date);
        setAvailability(prev => [
          ...prev.filter(a => !(a.employeeId === empId && dates.includes(a.date))),
          ...entries.map(e => ({ id: uid(), employeeId: empId, ...e }))
        ]);
      }}
      deliveryConfig={deliveryConfig[marketId] || { regularDays: [], exceptions: [] }}
      onUpdateDelivery={cfg => setDeliveryConfig(p => ({ ...p, [marketId]: cfg }))}
      roles={rolesConfig[marketId] || DEFAULT_ROLES}
      onUpdateRoles={roles => setRolesConfig(p => ({ ...p, [marketId]: roles }))}
    />
  );
}

// ─── PASSWORT FESTLEGEN (Erstanmeldung) ───────────────────────────────────────
function SetPasswordView({ name, onSave }) {
  const [pw1, setPw1] = useState("");
  const [pw2, setPw2] = useState("");
  const [error, setError] = useState("");

  function handleSave() {
    if (pw1.length < 4) { setError("Mindestens 4 Zeichen erforderlich."); return; }
    if (pw1 !== pw2) { setError("Passwörter stimmen nicht überein."); return; }
    onSave(pw1);
  }

  return (
    <div className="login">
      
      <div className="login-card">
        <div className="eyebrow">Erstes Login</div>
        <div className="login-title">Passwort festlegen</div>
        <div className="login-sub">Hallo {name}! Bitte lege jetzt dein persönliches Passwort fest.</div>
        <div className="field">
          <label>Neues Passwort</label>
          <input type="password" placeholder="Mindestens 4 Zeichen" value={pw1}
            onChange={e => { setPw1(e.target.value); setError(""); }} />
        </div>
        <div className="field">
          <label>Passwort wiederholen</label>
          <input type="password" placeholder="Bestätigen" value={pw2}
            onChange={e => { setPw2(e.target.value); setError(""); }}
            onKeyDown={e => e.key === "Enter" && pw1 && pw2 && handleSave()} />
        </div>
        {error && <div className="auth-error">{error}</div>}
        <button className="btn-primary" disabled={!pw1 || !pw2} onClick={handleSave}>Passwort speichern & einloggen</button>
      </div>
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar({ role, marketId, isAdmin, onMarketChange, onLogout, empName, onChangePw, sbOpen, onClose, onShowDelivery, onShowScan, onShowAddEmp, onShowRoles }) {
  const market = MARKETS.find(m => m.id === marketId);
  const action = (fn) => () => { fn?.(); onClose(); };
  return (
    <div className={`sidebar ${sbOpen ? "sb-open" : ""}`}>

// ─── MITARBEITER-ANSICHT ──────────────────────────────────────────────────────
function EmployeeView({ me, marketId, availability, shifts, weekStart, weekDates, onWeekChange, onSave, onChangePassword, onLogout }) {
  const [sbOpen, setSbOpen] = useState(false);
  const [showPwModal, setShowPwModal] = useState(false);
  const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
  const [pw1, setPw1] = useState(""); const [pw2, setPw2] = useState(""); const [pwErr, setPwErr] = useState(""); const [pwSaved, setPwSaved] = useState(false);

  const myShifts = useMemo(() => {
    const ws = weekDates.map(fmtISO);
    return shifts.filter(s => s.employeeId === me?.id && ws.includes(s.date));
  }, [shifts, me, weekDates]);

  const buildForm = () => Object.fromEntries(weekDates.map(d => {
    const a = availability.find(x => x.employeeId === me?.id && x.date === fmtISO(d));
    return [fmtISO(d), a ? { on: true, start: a.startTime, end: a.endTime } : { on: false, start: "08:00", end: "16:00" }];
  }));

  const [form, setForm] = useState(buildForm);
  const [saved, setSaved] = useState(null); // null = unberührt, false = geändert, true = gespeichert
  useEffect(() => { setForm(buildForm()); setSaved(null); }, [weekStart, me?.id]);

  const setDay = (ds, patch) => { setForm(f => ({ ...f, [ds]: { ...f[ds], ...patch } })); setSaved(false); };

  function handleSave() {
    const avails = weekDates.filter(d => form[fmtISO(d)]?.on).map(d => ({
      id: uid(), employeeId: me.id, date: fmtISO(d),
      startTime: form[fmtISO(d)].start, endTime: form[fmtISO(d)].end,
    }));
    onSave(avails); setSaved(true);
  }

  function handleChangePw() {
    if (pw1.length < 4) { setPwErr("Mindestens 4 Zeichen."); return; }
    if (pw1 !== pw2) { setPwErr("Passwörter stimmen nicht überein."); return; }
    onChangePassword(pw1); setPwSaved(true); setPw1(""); setPw2(""); setPwErr("");
    setTimeout(() => { setShowPwModal(false); setPwSaved(false); }, 1500);
  }

  const market = MARKETS.find(m => m.id === marketId);
  const locked = isPastDeadline(weekStart);
  const deadline = getDeadline(weekStart);
  const deadlineStr = deadline.toLocaleDateString("de-DE", { weekday: "long", day: "2-digit", month: "2-digit" });

  return (
    <div className="app">
      
      <div className="mob-bar">
        <button className="burger" onClick={() => setSbOpen(true)}>☰</button>
        <span className="mob-logo">Markt<b>Plan</b></span>
        <span />
      </div>
      {sbOpen && <div className="sb-overlay" onClick={() => setSbOpen(false)} />}
      <Sidebar role="employee" marketId={marketId} onMarketChange={() => {}} onLogout={() => { if (saved === false) { setShowLogoutConfirm(true); setSbOpen(false); } else { onLogout(); } }}
        empName={me?.name} onChangePw={() => { setShowPwModal(true); setSbOpen(false); }}
        sbOpen={sbOpen} onClose={() => setSbOpen(false)} />
      <div className="main">
        <div className="ph">
          <div className="ph-left">
            <div className="ph-title">Mein Schichtplan</div>
            <div className="ph-sub">{me?.name} · {market?.name}</div>
          </div>
        </div>

        <WeekNav weekStart={weekStart} weekDates={weekDates} onChange={onWeekChange} />

        <div className="sec-label" style={{ marginBottom: 10 }}>Meine Schichten diese Woche</div>
        <div className="avcard" style={{ marginBottom: 20 }}>
          {myShifts.length === 0
            ? <div className="empty-sched">Noch keine Schichten für diese Woche eingeplant.</div>
            : weekDates.map((d, i) => {
                const sh = myShifts.find(s => s.date === fmtISO(d));
                if (!sh) return null;
                return (
                  <div key={fmtISO(d)} className="sched-row">
                    <div className="sched-day">{DAY_NAMES[i]}, {fmtShort(d)}</div>
                    <div className="sched-time">{sh.startTime} – {sh.endTime} Uhr</div>
                    <div className="sched-badge">Eingeplant</div>
                  </div>
                );
              })}
        </div>

        <div className="sec-label" style={{ marginBottom: 10 }}>Meine Verfügbarkeit eintragen</div>
        {locked && (
          <div className="alert-w" style={{ marginBottom: 14 }}>
            🔒 Frist abgelaufen — Eintragen war bis {deadlineStr}, 23:59 Uhr möglich. Änderungen für diese Woche sind nicht mehr möglich.
          </div>
        )}
        <div className="avcard" style={{ opacity: locked ? 0.6 : 1 }}>
          {weekDates.map((d, i) => {
            const ds = fmtISO(d); const day = form[ds] || { on: false, start: "08:00", end: "16:00" };
            return (
              <div key={ds} className="av-row">
                <div className="av-d">{DAY_NAMES[i]}</div>
                <div className="av-date">{fmtShort(d)}</div>
                <label className="toggle">
                  <input type="checkbox" checked={day.on} disabled={locked} onChange={e => !locked && setDay(ds, { on: e.target.checked })} />
                  <span className="t-track" style={{ cursor: locked ? "not-allowed" : "pointer" }} />
                </label>
                {day.on
                  ? <div className="tr">
                      <input type="time" value={day.start} disabled={locked} onChange={e => !locked && setDay(ds, { start: e.target.value })} />
                      <span className="tr-sep">–</span>
                      <input type="time" value={day.end} disabled={locked} onChange={e => !locked && setDay(ds, { end: e.target.value })} />
                    </div>
                  : <div className="av-none">Nicht verfügbar</div>}
              </div>
            );
          })}
          <div className="save-bar">
            <button className="btn-save" disabled={locked} onClick={handleSave}
              style={{ opacity: locked ? 0.4 : 1, cursor: locked ? "not-allowed" : "pointer" }}>
              Verfügbarkeit speichern
            </button>
            {saved === true && <div className="saved">✓ Gespeichert</div>}
            {saved === false && !locked && <div style={{ fontSize: 12, color: "#F59E0B", fontWeight: 600 }}>⚠ Nicht gespeichert</div>}
            {!locked && <div style={{ fontSize: 12, color: "#94A3B8" }}>Frist: {deadlineStr}, 23:59 Uhr</div>}
          </div>
        </div>
      </div>

      {showLogoutConfirm && (
        <div className="ov" onClick={() => setShowLogoutConfirm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Nicht gespeichert</div>
            <div className="modal-s">Du hast Zeiten eingetragen, aber noch nicht gespeichert. Wenn du dich jetzt abmeldest, gehen deine Eingaben verloren.</div>
            <div className="macts">
              <button className="btn-cancel" onClick={() => setShowLogoutConfirm(false)}>Zurück</button>
              <button className="btn-save" style={{ flex: 1 }} onClick={() => { handleSave(); setShowLogoutConfirm(false); }}>Jetzt speichern</button>
              <button className="btn-del" onClick={onLogout}>Trotzdem abmelden</button>
            </div>
          </div>
        </div>
      )}

      {showPwModal && (
        <div className="ov" onClick={() => { setShowPwModal(false); setPw1(""); setPw2(""); setPwErr(""); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Passwort ändern</div>
            <div className="modal-s">Lege ein neues persönliches Passwort fest.</div>
            <div className="field"><label>Neues Passwort</label>
              <input type="password" placeholder="Mindestens 4 Zeichen" value={pw1}
                onChange={e => { setPw1(e.target.value); setPwErr(""); }} />
            </div>
            <div className="field" style={{ marginBottom: 6 }}><label>Wiederholen</label>
              <input type="password" placeholder="Bestätigen" value={pw2}
                onChange={e => { setPw2(e.target.value); setPwErr(""); }}
                onKeyDown={e => e.key === "Enter" && handleChangePw()} />
            </div>
            {pwErr && <div className="auth-error" style={{ marginTop: 8 }}>{pwErr}</div>}
            {pwSaved && <div className="saved" style={{ display: 'block', marginTop: 8 }}>✓ Passwort gespeichert</div>}
            <div className="macts" style={{ marginTop: 16 }}>
              <button className="btn-cancel" onClick={() => { setShowPwModal(false); setPw1(""); setPw2(""); setPwErr(""); }}>Abbrechen</button>
              <button className="btn-ok" disabled={!pw1 || !pw2} onClick={handleChangePw}>Speichern</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SCAN MODAL ──────────────────────────────────────────────────────────────
function ScanModal({ marketId, employees, onImport, onClose }) {
  const [image, setImage] = useState(null); // { base64, mediaType, dataUrl }
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [matchedEmpId, setMatchedEmpId] = useState("");
  const fileRef = useRef(null);
  const mktEmps = employees.filter(e => e.marketId === marketId);

  function handleFile(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      const dataUrl = evt.target.result;
      setImage({ base64: dataUrl.split(",")[1], mediaType: file.type || "image/jpeg", dataUrl });
      setResult(null); setError("");
    };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    if (!image) return;
    setLoading(true); setError("");
    try {
      const today = new Date();
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: image.mediaType, data: image.base64 } },
            { type: "text", text: `This is a handwritten availability/schedule sheet from a retail store employee. Today is ${today.toISOString().split("T")[0]}.
Extract all availability entries and return ONLY valid JSON, no markdown, no explanation:
{
  "employeeName": "string or null",
  "entries": [
    { "date": "YYYY-MM-DD", "startTime": "HH:MM", "endTime": "HH:MM" }
  ]
}
Rules: Use current or next month for dates without a year. 24h time format. Default times 08:00–16:00 if only a date is visible with no time. Return empty entries array if nothing readable.` }
          ]}]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content.map(c => c.text || "").join("");
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      setResult(parsed);
      if (parsed.employeeName) {
        const first = parsed.employeeName.toLowerCase().split(" ")[0];
        const match = mktEmps.find(e => e.name.toLowerCase().split(" ")[0] === first || e.name.toLowerCase().includes(first));
        if (match) setMatchedEmpId(String(match.id));
      }
    } catch (err) {
      setError("Auslesen fehlgeschlagen. Bitte nochmal versuchen. (" + err.message + ")");
    }
    setLoading(false);
  }

  function handleImport() {
    if (!result || !matchedEmpId) return;
    onImport(parseInt(matchedEmpId), result.entries);
    onClose();
  }

  return (
    <div className="ov" onClick={onClose}>
      <div className="modal" style={{ width: "min(480px, calc(100vw - 32px))", maxHeight: "88vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
        <div className="modal-t">📷 Zettel scannen</div>
        <div className="modal-s">Foto vom handgeschriebenen Verfügbarkeitszettel — KI liest die Zeiten automatisch aus.</div>

        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={handleFile} />

        {!image ? (
          <div className="scan-drop" onClick={() => fileRef.current?.click()}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📷</div>
            <div>Kamera öffnen oder Bild auswählen</div>
            <div style={{ fontSize: 12, marginTop: 4, color: "#CBD5E1" }}>Auf Mobilgeräten öffnet sich direkt die Kamera</div>
          </div>
        ) : (
          <>
            <img src={image.dataUrl} alt="Scan" style={{ width: "100%", borderRadius: 10, marginBottom: 12, border: "1.5px solid #E2E8F0", display: "block" }} />
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              <button className="btn-cancel" style={{ flex: 1 }} onClick={() => { setImage(null); setResult(null); setError(""); }}>
                🔄 Neu aufnehmen
              </button>
              <button className="btn-ok" style={{ flex: 1 }} onClick={analyze} disabled={loading}>
                {loading ? <><span className="spin">⟳</span> Wird ausgelesen…</> : "🔍 Auslesen"}
              </button>
            </div>
          </>
        )}

        {error && <div className="auth-error" style={{ marginBottom: 14 }}>{error}</div>}

        {result && <>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: "#475569", marginBottom: 8 }}>
            Erkannte Daten ({result.entries?.length ?? 0} Einträge)
          </div>

          {result.employeeName && (
            <div style={{ fontSize: 13, color: "#64748B", marginBottom: 10 }}>
              Name auf Zettel: <strong style={{ color: "#1E293B" }}>{result.employeeName}</strong>
            </div>
          )}

          <div className="field" style={{ marginBottom: 14 }}>
            <label>Mitarbeiter zuordnen</label>
            <select value={matchedEmpId} onChange={e => setMatchedEmpId(e.target.value)}>
              <option value="">Mitarbeiter wählen…</option>
              {mktEmps.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>

          <div style={{ background: "#F8FAFC", borderRadius: 10, padding: "8px 14px", marginBottom: 16, maxHeight: 200, overflowY: "auto" }}>
            {result.entries?.length > 0
              ? result.entries.map((e, i) => (
                <div key={i} className="scan-entry">
                  <span className="k">{e.date}</span>
                  <span className="v">{e.startTime} – {e.endTime} Uhr</span>
                </div>
              ))
              : <div style={{ fontSize: 13, color: "#94A3B8", padding: "8px 0" }}>Keine Einträge erkannt — anderes Foto versuchen.</div>
            }
          </div>

          <div className="macts">
            <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
            <button className="btn-ok" disabled={!matchedEmpId || !result.entries?.length} onClick={handleImport}>
              ✓ Übernehmen ({result.entries?.length ?? 0})
            </button>
          </div>
        </>}

        {!result && !loading && (
          <div className="macts" style={{ marginTop: image ? 0 : 8 }}>
            <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── LIEFERTAGE MODAL ────────────────────────────────────────────────────────
function DeliveryModal({ config, onSave, onClose }) {
  const [types, setTypes] = useState(config?.types || []);
  const [exceptions, setExceptions] = useState(config?.exceptions || []);
  const [newName, setNewName] = useState("");
  const [newDate, setNewDate] = useState("");
  const [newNote, setNewNote] = useState("");

  function addType() {
    if (!newName.trim()) return;
    const color = TYPE_COLORS[types.length % TYPE_COLORS.length];
    setTypes(t => [...t, { id: uid(), name: newName.trim(), color, days: [] }]);
    setNewName("");
  }

  function updateType(id, patch) {
    setTypes(t => t.map(x => x.id === id ? { ...x, ...patch } : x));
  }

  function toggleDay(id, i) {
    setTypes(t => t.map(x => x.id === id
      ? { ...x, days: x.days.includes(i) ? x.days.filter(d => d !== i) : [...x.days, i].sort((a,b)=>a-b) }
      : x));
  }


  function addException() {
    if (!newDate) return;
    setExceptions(e => [...e.filter(x => x.date !== newDate), { date: newDate, note: newNote }]
      .sort((a, b) => a.date.localeCompare(b.date)));
    setNewDate(""); setNewNote("");
  }

  const pill = (color, active) => ({
    padding: "5px 10px", borderRadius: 7, border: "1.5px solid",
    borderColor: active ? color : "#E2E8F0",
    background: active ? color + "22" : "#fff",
    color: active ? color : "#94A3B8",
    fontWeight: 700, fontSize: 12, cursor: "pointer", transition: "all .1s",
  });

  return (
    <div className="ov" onClick={onClose}>
      <div className="modal" style={{ width: "min(560px, calc(100vw - 24px))", maxHeight: "90vh", overflowY: "auto" }}
        onClick={e => e.stopPropagation()}>
        <div className="modal-t">🚚 Liefertage konfigurieren</div>
        <div className="modal-s">Lege Lieferarten mit eigenen Namen an und bestimme, an welchen Tagen sie stattfinden.</div>

        {/* ── Lieferarten ── */}
        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#475569", marginBottom: 10 }}>Lieferarten</div>

        {types.length === 0 && (
          <div style={{ fontSize: 13, color: "#94A3B8", marginBottom: 14, padding: "10px 0" }}>Noch keine Lieferart angelegt.</div>
        )}

        {types.map(t => (
          <div key={t.id} style={{ background: "#F8FAFC", borderRadius: 10, padding: "12px 14px", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <label title="Farbe wählen" style={{ position: "relative", width: 24, height: 24, flexShrink: 0, cursor: "pointer" }}>
                <input type="color" value={t.color} onChange={e => updateType(t.id, { color: e.target.value })}
                  style={{ position: "absolute", opacity: 0, width: "100%", height: "100%", cursor: "pointer" }} />
                <div style={{ width: 24, height: 24, borderRadius: "50%", background: t.color, border: "2px solid white", boxShadow: "0 0 0 1.5px " + t.color }} />
              </label>
              <input value={t.name} onChange={e => updateType(t.id, { name: e.target.value })}
                style={{ flex: 1, border: "1.5px solid #E2E8F0", borderRadius: 7, padding: "6px 10px", fontSize: 14, fontWeight: 600, color: "#1E293B", outline: "none", background: "white" }} />
              <button onClick={() => setTypes(t2 => t2.filter(x => x.id !== t.id))}
                style={{ background: "none", border: "none", color: "#CBD5E1", fontSize: 18, cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {DAY_NAMES.map((d, i) => (
                <button key={i} onClick={() => toggleDay(t.id, i)} style={pill(t.color, t.days.includes(i))}>{d}</button>
              ))}
            </div>
          </div>
        ))}

        <div style={{ display: "flex", gap: 8, marginBottom: 22 }}>
          <input type="text" placeholder="Name der Lieferart, z.B. Frischware…"
            value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addType()}
            style={{ flex: 1, padding: "9px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontSize: 14, outline: "none" }} />
          <button className="btn-ok" style={{ padding: "9px 16px", whiteSpace: "nowrap" }} disabled={!newName.trim()} onClick={addType}>+ Anlegen</button>
        </div>

        {/* ── Ausnahmen ── */}
        <div style={{ borderTop: "1px solid #F1F5F9", paddingTop: 18, marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#475569" }}>Ausnahmen ⚠️</div>
            <button onClick={() => {
              const yr = new Date().getFullYear();
              const feiertage = [...getHessenHolidays(yr), ...getHessenHolidays(yr + 1)];
              setExceptions(ex => [...ex.filter(e => !feiertage.some(f => f.date === e.date)), ...feiertage]
                .sort((a,b) => a.date.localeCompare(b.date)));
            }} style={{ fontSize: 11, color: "#16A34A", background: "#F0FDF4", border: "1px solid #86EFAC", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontWeight: 600 }}>
              ↺ Hessen-Feiertage
            </button>
          </div>

          {exceptions.length > 0 && (
            <div style={{ background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 10, padding: "4px 12px", marginBottom: 12, maxHeight: 180, overflowY: "auto" }}>
              {exceptions.map(ex => (
                <div key={ex.date} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #FEF3C7" }}>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: "#92400E" }}>{ex.date}</span>
                    {ex.note && <span style={{ fontSize: 12, color: "#B45309", marginLeft: 8 }}>{ex.note}</span>}
                  </div>
                  <button onClick={() => setExceptions(e => e.filter(x => x.date !== ex.date))}
                    style={{ background: "none", border: "none", color: "#D97706", cursor: "pointer", fontSize: 16, padding: "0 4px" }}>×</button>
                </div>
              ))}
            </div>
          )}

          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div className="field" style={{ flex: "0 0 148px", marginBottom: 0 }}>
              <label>Datum</label>
              <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} />
            </div>
            <div className="field" style={{ flex: 1, minWidth: 110, marginBottom: 0 }}>
              <label>Grund (optional)</label>
              <input type="text" placeholder="z.B. Feiertag" value={newNote}
                onChange={e => setNewNote(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addException()} />
            </div>
            <button className="btn-ok" style={{ padding: "10px 14px", whiteSpace: "nowrap", flexShrink: 0 }}
              disabled={!newDate} onClick={addException}>+ Hinzufügen</button>
          </div>
        </div>

        <div className="macts" style={{ marginTop: 18 }}>
          <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
          <button className="btn-ok" onClick={() => { onSave({ types, exceptions }); onClose(); }}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── ROLLEN MODAL ────────────────────────────────────────────────────────────
function RolesModal({ roles, onSave, onClose }) {
  const [list, setList] = useState(roles.map(r => ({ ...r })));
  const [newName, setNewName] = useState("");

  function addRole() {
    if (!newName.trim()) return;
    const color = ROLE_COLORS[list.length % ROLE_COLORS.length];
    setList(l => [...l, { id: uid(), name: newName.trim(), color }]);
    setNewName("");
  }


  return (
    <div className="ov" onClick={onClose}>
      <div className="modal" style={{ width: "min(480px, calc(100vw - 24px))", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
        <div className="modal-t">👷 Abteilungen / Rollen</div>
        <div className="modal-s">Lege die Rollen fest, die Mitarbeitern bei der Schichtplanung zugewiesen werden können.</div>

        {list.length === 0 && <div style={{ fontSize: 13, color: "#94A3B8", padding: "8px 0 14px" }}>Noch keine Rollen angelegt.</div>}

        {list.map(r => (
          <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: "1px solid #F1F5F9" }}>
            <label title="Farbe wählen" style={{ position: "relative", width: 24, height: 24, flexShrink: 0, cursor: "pointer" }}>
              <input type="color" value={r.color} onChange={e => setList(l => l.map(x => x.id === r.id ? { ...x, color: e.target.value } : x))}
                style={{ position: "absolute", opacity: 0, width: "100%", height: "100%", cursor: "pointer" }} />
              <div style={{ width: 24, height: 24, borderRadius: "50%", background: r.color, border: "2px solid white", boxShadow: "0 0 0 1.5px " + r.color }} />
            </label>
            <input value={r.name} onChange={e => setList(l => l.map(x => x.id === r.id ? { ...x, name: e.target.value } : x))}
              style={{ flex: 1, border: "1.5px solid #E2E8F0", borderRadius: 7, padding: "6px 10px", fontSize: 14, fontWeight: 600, color: "#1E293B", outline: "none", background: "white" }} />
            <button onClick={() => setList(l => l.filter(x => x.id !== r.id))}
              style={{ background: "none", border: "none", color: "#CBD5E1", fontSize: 18, cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
          </div>
        ))}

        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <input type="text" placeholder="Neue Rolle, z.B. Frischetheke…"
            value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addRole()}
            style={{ flex: 1, padding: "9px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontSize: 14, outline: "none" }} />
          <button className="btn-ok" style={{ padding: "9px 16px", whiteSpace: "nowrap" }} disabled={!newName.trim()} onClick={addRole}>+ Anlegen</button>
        </div>

        <div className="macts" style={{ marginTop: 18 }}>
          <button className="btn-cancel" onClick={onClose}>Abbrechen</button>
          <button className="btn-ok" onClick={() => { onSave(list); onClose(); }}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── MARKTLEITUNG-ANSICHT ─────────────────────────────────────────────────────
function ManagerView({ marketId, onMarketChange, isAdmin, employees, availability, shifts, weekStart, weekDates, onWeekChange, onAddShift, onDelShift, onAddEmployee, onDeleteEmployee, onImportAvailability, deliveryConfig, onUpdateDelivery, roles, onUpdateRoles, onLogout }) {
  const [sbOpen, setSbOpen] = useState(false);
  const [modal, setModal] = useState(null);
  const [delEmpModal, setDelEmpModal] = useState(null);
  const [showAddEmp, setShowAddEmp] = useState(false);
  const [showScan, setShowScan] = useState(false);
  const [showDelivery, setShowDelivery] = useState(false);
  const [showRoles, setShowRoles] = useState(false);
  const [newEmpName, setNewEmpName] = useState("");
  const [newEmpPw, setNewEmpPw] = useState("");
  const [newEmpHours, setNewEmpHours] = useState("");

  const mktEmps = employees.filter(e => e.marketId === marketId);
  const weekStrs = weekDates.map(fmtISO);

  const availMap = useMemo(() => {
    const m = {}; availability.forEach(a => { m[`${a.employeeId}:${a.date}`] = a; }); return m;
  }, [availability]);

  const shiftMap = useMemo(() => {
    const m = {}; shifts.forEach(s => { m[`${s.employeeId}:${s.date}`] = s; }); return m;
  }, [shifts]);

  const totalAvail = availability.filter(a => mktEmps.some(e => e.id === a.employeeId) && weekStrs.includes(a.date)).length;
  const totalShifts = shifts.filter(s => mktEmps.some(e => e.id === s.employeeId) && weekStrs.includes(s.date)).length;

  function calcHours(start, end) {
    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);
    return Math.round(((eh * 60 + em) - (sh * 60 + sm)) / 60 * 10) / 10;
  }

  const totalIstHours = shifts
    .filter(s => mktEmps.some(e => e.id === s.employeeId) && weekStrs.includes(s.date))
    .reduce((sum, s) => sum + calcHours(s.startTime, s.endTime), 0);

  const market = MARKETS.find(m => m.id === marketId);
  const [shiftStart, setShiftStart] = useState("");
  const [shiftEnd, setShiftEnd] = useState("");
  const [shiftRole, setShiftRole] = useState("");
  const [timeErr, setTimeErr] = useState("");

  function addEmp() {
    if (!newEmpName.trim() || !newEmpPw) return;
    onAddEmployee(newEmpName.trim(), newEmpPw, newEmpHours ? parseInt(newEmpHours) : null);
    setShowAddEmp(false); setNewEmpName(""); setNewEmpPw(""); setNewEmpHours("");
  }

  function openCell(emp, ds) {
    const av = availMap[`${emp.id}:${ds}`];
    const sh = shiftMap[`${emp.id}:${ds}`];
    setShiftStart(sh?.startTime ?? av?.startTime ?? "08:00");
    setShiftEnd(sh?.endTime ?? av?.endTime ?? "16:00");
    setShiftRole(sh?.role ?? "");
    setTimeErr("");
    setModal({ emp, date: ds, av, sh });
  }

  function confirmShift() {
    const av = modal.av;
    if (shiftStart >= shiftEnd) { setTimeErr("Startzeit muss vor Endzeit liegen."); return; }
    if (av && (shiftStart < av.startTime || shiftEnd > av.endTime)) {
      setTimeErr(`Zeiten müssen innerhalb der Verfügbarkeit ${av.startTime}–${av.endTime} liegen.`);
      return;
    }
    if (modal.sh) onDelShift(modal.sh.id);
    onAddShift({ employeeId: modal.emp.id, date: modal.date, startTime: shiftStart, endTime: shiftEnd, role: shiftRole });
    setModal(null);
  }

  return (
    <div className="app">
      
      <div className="mob-bar">
        <button className="burger" onClick={() => setSbOpen(true)}>☰</button>
        <span className="mob-logo">Markt<b>Plan</b></span>
        <span />
      </div>
      {sbOpen && <div className="sb-overlay" onClick={() => setSbOpen(false)} />}
      <Sidebar role={isAdmin ? "admin" : "manager"} marketId={marketId} isAdmin={isAdmin}
        onMarketChange={id => { onMarketChange(id); setSbOpen(false); }}
        onLogout={onLogout} sbOpen={sbOpen} onClose={() => setSbOpen(false)}
        onShowDelivery={() => setShowDelivery(true)}
        onShowScan={() => setShowScan(true)}
        onShowAddEmp={() => setShowAddEmp(true)}
        onShowRoles={() => setShowRoles(true)} />
      <div className="main">
        <div className="ph">
          <div className="ph-left">
            <div className="ph-title">{market?.name ?? "Markt wählen"}</div>
            <div className="ph-sub">Schichtplan verwalten</div>
          </div>
        </div>

        {!marketId ? (
          <div className="alert-w">Bitte links einen Markt auswählen.</div>
        ) : <>
          <div className="stats">
            <div className="stat"><div className="stat-v">{mktEmps.length}</div><div className="stat-k">Mitarbeiter</div></div>
            <div className="stat"><div className="stat-v">{totalAvail}</div><div className="stat-k">Verfügbar diese Woche</div></div>
            <div className="stat"><div className="stat-v" style={{ color: totalShifts > 0 ? "#1D4ED8" : "#0F172A" }}>{totalShifts}</div><div className="stat-k">Schichten geplant</div></div>
            <div className="stat"><div className="stat-v" style={{ color: "#059669" }}>{totalIstHours}h</div><div className="stat-k">Stunden geplant (Ist)</div></div>
          </div>

          <WeekNav weekStart={weekStart} weekDates={weekDates} onChange={onWeekChange} />

          {(() => {
            const weekExceptions = weekDates
              .map((d, i) => i !== 6 ? deliveryConfig.exceptions.find(e => e.date === fmtISO(d)) : null)
              .filter(Boolean);
            return weekExceptions.length > 0 ? (
              <div style={{ background: "#FEF2F2", border: "1.5px solid #FECACA", borderRadius: 10, padding: "12px 16px", marginBottom: 16 }}>
                <div style={{ fontWeight: 700, color: "#DC2626", fontSize: 14, marginBottom: 4 }}>
                  ⛔ Umplanung erforderlich — {weekExceptions.length} Feiertag{weekExceptions.length > 1 ? "e" : ""} diese Woche
                </div>
                <div style={{ fontSize: 13, color: "#B91C1C" }}>
                  {weekExceptions.map(ex => `${ex.date}: ${ex.note}`).join(" · ")}
                </div>
              </div>
            ) : null;
          })()}

          <div className="grid-wrap">
            <div className="grid-head">
              <div className="gh-name">Mitarbeiter</div>
              {weekDates.map((d, i) => {
                const ds = fmtISO(d);
                const dayTypes = (deliveryConfig.types || []).filter(t => t.days.includes(i));
                const exception = deliveryConfig.exceptions.find(e => e.date === ds);
                const isSunday = i === 6;
                const showRed = exception && !isSunday;
                return (
                  <div key={i} className={`gh-day ${isToday(d) ? "today" : ""}`}
                    style={showRed ? { background: "#FEF2F2" } : undefined}>
                    <div className="gh-day-n" style={showRed ? { color: "#DC2626" } : undefined}>{DAY_NAMES[i]}</div>
                    <div className="gh-day-d" style={showRed ? { color: "#DC2626" } : undefined}>{fmtShort(d)}</div>
                    {showRed
                      ? <div title={exception.note} style={{ fontSize: 10, color: "#DC2626", fontWeight: 700, marginTop: 2, lineHeight: 1.2 }}>⛔ {exception.note}</div>
                      : exception && isSunday
                      ? <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 2, lineHeight: 1.2 }}>{exception.note}</div>
                      : dayTypes.length > 0
                      ? <div style={{ display: "flex", flexDirection: "column", gap: 2, marginTop: 3 }}>
                          {dayTypes.map(t => {
                            const covered = shifts.some(s =>
                              mktEmps.some(e => e.id === s.employeeId) &&
                              s.date === ds && s.role === t.name
                            );
                            return (
                              <div key={t.id} style={{
                                fontSize: 10, fontWeight: 700, color: t.color,
                                background: t.color + "18", borderRadius: 4,
                                padding: "1px 5px", lineHeight: 1.4, whiteSpace: "nowrap",
                                overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100%",
                                display: "flex", alignItems: "center", gap: 3,
                              }}>
                                <span>🚚 {t.name}</span>
                                <span title={covered ? "Besetzt" : "Niemand eingeplant"} style={{ marginLeft: "auto", fontSize: 10 }}>
                                  {covered ? "✓" : "⚠"}
                                </span>
                              </div>
                            );
                          })}
                        </div>
                      : null}
                  </div>
                );
              })}
            </div>
            {mktEmps.length === 0
              ? <div className="empty-state">Noch keine Mitarbeiter. Klicke auf „+ Mitarbeiter anlegen".</div>
              : mktEmps.map(emp => {
                const empIst = shifts
                  .filter(s => s.employeeId === emp.id && weekStrs.includes(s.date))
                  .reduce((sum, s) => sum + calcHours(s.startTime, s.endTime), 0);
                const istColor = !emp.weeklyHours ? "#64748B" : empIst >= emp.weeklyHours ? "#059669" : "#DC2626";
                return (
                <div key={emp.id} className="grid-row">
                  <div className="gr-name">
                    <div>
                      <div className="gr-name-text">{emp.name}</div>
                      <div style={{ fontSize: 11, marginTop: 2, color: istColor, fontWeight: 600 }}>
                        Ist: {empIst}h{emp.weeklyHours ? ` / Soll: ${emp.weeklyHours}h` : ""}
                      </div>
                    </div>
                    <button className="btn-del-emp" title="Mitarbeiter entfernen" onClick={() => setDelEmpModal(emp)}>×</button>
                  </div>
                  {weekDates.map((d, i) => {
                    const ds = fmtISO(d);
                    const av = availMap[`${emp.id}:${ds}`];
                    const sh = shiftMap[`${emp.id}:${ds}`];
                    return (
                      <div key={i} className="gr-cell">
                        {sh
                          ? (() => { const roleObj = roles.find(r => r.name === sh.role); return (
                            <div className="bl sh" onClick={() => openCell(emp, ds)} style={roleObj ? { borderColor: roleObj.color, background: roleObj.color + "18" } : undefined}>
                              <span className="bl-time" style={roleObj ? { color: roleObj.color } : undefined}>{sh.startTime}–{sh.endTime}</span>
                              <span className="bl-tag" style={roleObj ? { color: roleObj.color, opacity: 1, fontWeight: 700 } : undefined}>{sh.role || "Geplant"}</span>
                            </div>); })()
                          : av
                          ? <div className="bl av" onClick={() => openCell(emp, ds)}><span className="bl-time">{av.startTime}–{av.endTime}</span><span className="bl-tag">Verfügbar</span></div>
                          : <div className="bl mt">–</div>}
                      </div>
                    );
                  })}
                </div>
              );
              })}
          </div>
          <div className="legend">
            <span><span className="legend-dot dot-av" />Verfügbar — klicken zum Einplanen / Zeiten anpassen</span>
            <span><span className="legend-dot dot-sh" />Geplant — klicken zum Bearbeiten oder Löschen</span>
          </div>

          {roles.length > 0 && (() => {
            const weekShifts = shifts.filter(s => mktEmps.some(e => e.id === s.employeeId) && weekStrs.includes(s.date));
            return (
              <div style={{ marginTop: 16, background: "#fff", borderRadius: 14, padding: "14px 18px", boxShadow: "0 2px 16px rgba(0,0,0,.07)" }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "#94A3B8", marginBottom: 10 }}>Rollenbelegung diese Woche</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {roles.map(r => {
                    const count = weekShifts.filter(s => s.role === r.name).length;
                    return (
                      <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 6, background: r.color + "15", border: "1.5px solid " + r.color + "44", borderRadius: 9, padding: "6px 12px" }}>
                        <div style={{ width: 10, height: 10, borderRadius: "50%", background: r.color, flexShrink: 0 }} />
                        <span style={{ fontSize: 13, fontWeight: 700, color: r.color }}>{r.name}</span>
                        <span style={{ fontSize: 13, color: "#64748B" }}>·</span>
                        <span style={{ fontSize: 13, fontWeight: 600, color: count > 0 ? "#1E293B" : "#CBD5E1" }}>{count}×</span>
                      </div>
                    );
                  })}
                  {weekShifts.filter(s => !s.role).length > 0 && (
                    <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#F1F5F9", border: "1.5px solid #E2E8F0", borderRadius: 9, padding: "6px 12px" }}>
                      <span style={{ fontSize: 13, color: "#94A3B8" }}>Ohne Rolle · {weekShifts.filter(s => !s.role).length}×</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}
        </>}
      </div>

      {/* Schicht-Modal */}
      {modal && (
        <div className="ov" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">{modal.sh ? "Schicht bearbeiten" : "Schicht einplanen"}</div>
            <div className="modal-s">{modal.emp.name} · {modal.date}</div>
            {modal.av && (
              <div className="minfo" style={{ marginBottom: 14 }}>
                <div className="minfo-r">
                  <span className="k">Verfügbar laut Mitarbeiter</span>
                  <span className="v">{modal.av.startTime} – {modal.av.endTime} Uhr</span>
                </div>
              </div>
            )}
            <div style={{ marginBottom: 6, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: "#475569" }}>Schichtzeit festlegen</div>
            <div className="tr" style={{ marginBottom: 14 }}>
              <input type="time" value={shiftStart} onChange={e => { setShiftStart(e.target.value); setTimeErr(""); }} style={{ padding: "8px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontSize: 14, color: "#1E293B", width: 120, outline: "none" }} />
              <span className="tr-sep" style={{ fontSize: 16 }}>–</span>
              <input type="time" value={shiftEnd} onChange={e => { setShiftEnd(e.target.value); setTimeErr(""); }} style={{ padding: "8px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontSize: 14, color: "#1E293B", width: 120, outline: "none" }} />
            </div>
            <div style={{ marginBottom: 6, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: "#475569" }}>Abteilung / Rolle</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
              <button onClick={() => setShiftRole("")} style={{ padding: "5px 12px", borderRadius: 7, border: "1.5px solid", borderColor: shiftRole === "" ? "#94A3B8" : "#E2E8F0", background: shiftRole === "" ? "#F1F5F9" : "#fff", color: shiftRole === "" ? "#475569" : "#94A3B8", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Keine</button>
              {roles.map(r => (
                <button key={r.id} onClick={() => setShiftRole(r.name)} style={{ padding: "5px 12px", borderRadius: 7, border: "1.5px solid", borderColor: shiftRole === r.name ? r.color : "#E2E8F0", background: shiftRole === r.name ? r.color + "22" : "#fff", color: shiftRole === r.name ? r.color : "#94A3B8", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>{r.name}</button>
              ))}
            </div>
            {timeErr && <div className="auth-error" style={{ marginBottom: 12 }}>{timeErr}</div>}
            <div className="macts">
              <button className="btn-cancel" onClick={() => setModal(null)}>Abbrechen</button>
              {modal.sh && <button className="btn-del" onClick={() => { onDelShift(modal.sh.id); setModal(null); }}>Löschen</button>}
              <button className="btn-ok" disabled={!shiftStart || !shiftEnd} onClick={confirmShift}>
                {modal.sh ? "Speichern" : "Einplanen"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Mitarbeiter anlegen Modal */}
      {showAddEmp && (
        <div className="ov" onClick={() => { setShowAddEmp(false); setNewEmpName(""); setNewEmpPw(""); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Mitarbeiter anlegen</div>
            <div className="modal-s">Neuen Zugang für {market?.name} erstellen.</div>
            <div className="field"><label>Vollständiger Name</label>
              <input type="text" placeholder="Vor- und Nachname" value={newEmpName} onChange={e => setNewEmpName(e.target.value)} />
            </div>
            <div className="field"><label>Initiales Passwort</label>
              <input type="password" placeholder="Temporäres Passwort vergeben" value={newEmpPw}
                onChange={e => setNewEmpPw(e.target.value)} />
            </div>
            <div className="field"><label>Wochenstunden-Soll (optional)</label>
              <input type="number" placeholder="z.B. 35" min="1" max="48" value={newEmpHours}
                onChange={e => setNewEmpHours(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addEmp()} />
            </div>
            <div className="pw-hint">Der Mitarbeiter wird beim ersten Login aufgefordert, ein eigenes Passwort zu setzen.</div>
            <div className="macts">
              <button className="btn-cancel" onClick={() => { setShowAddEmp(false); setNewEmpName(""); setNewEmpPw(""); setNewEmpHours(""); }}>Abbrechen</button>
              <button className="btn-ok" disabled={!newEmpName.trim() || !newEmpPw} onClick={addEmp}>Anlegen</button>
            </div>
          </div>
        </div>
      )}

      {showScan && (
        <ScanModal marketId={marketId} employees={employees}
          onImport={onImportAvailability} onClose={() => setShowScan(false)} />
      )}

      {showDelivery && (
        <DeliveryModal config={deliveryConfig} onSave={onUpdateDelivery} onClose={() => setShowDelivery(false)} />
      )}

      {showRoles && (
        <RolesModal roles={roles} onSave={onUpdateRoles} onClose={() => setShowRoles(false)} />
      )}

      {delEmpModal && (
        <div className="ov" onClick={() => setDelEmpModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Mitarbeiter entfernen</div>
            <div className="modal-s">Soll <strong>{delEmpModal.name}</strong> wirklich gelöscht werden?</div>
            <div className="minfo">
              <div className="minfo-r"><span className="k">Achtung</span><span className="v" style={{ color: "#DC2626" }}>Nicht rückgängig machbar</span></div>
              <div className="minfo-r"><span className="k">Entfernt auch</span><span className="v">Alle Verfügbarkeiten & Schichten</span></div>
            </div>
            <div className="macts">
              <button className="btn-cancel" onClick={() => setDelEmpModal(null)}>Abbrechen</button>
              <button className="btn-del" onClick={() => { onDeleteEmployee(delEmpModal.id); setDelEmpModal(null); }}>
                Endgültig löschen
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
