              <div className="field">
                <label>Rollen</label>
                <div className="role-chip-wrap" style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {roles.map(r => {
                    const on = shRoles.includes(r.name);
                    return (
                      <button key={r.id} className="role-chip"
                        onClick={() => setEditProposal(p => ({ ...p, shift: { ...p.shift, roles: on ? p.shift.roles.filter(x => x !== r.name) : [...p.shift.roles, r.name] } }))}
                        style={{ padding: "4px 10px", borderRadius: 7, border: "1.5px solid", borderColor: on ? r.color : "#E2E8F0", background: on ? r.color + "22" : "#fff", color: on ? r.color : "#94A3B8", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                        {r.name}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div className="macts" style={{ display: "flex", gap: 8, marginTop: 16 }}>
                <button className="btn-cancel" style={{ flex: 1 }}
                  onClick={() => { setAutoPlanProposal(p => p.filter(x => x.id !== s.id)); setEditProposal(null); }}>
                  🗑 Entfernen
                </button>
                <button className="btn-ok" style={{ flex: 2 }}
                  onClick={() => {
                    const start = document.getElementById("ep-start").value;
                    const end = document.getElementById("ep-end").value;
                    if (!start || !end || start >= end) return;
                    setAutoPlanProposal(p => p.map(x => x.id !== s.id ? x : { ...x, startTime: start, endTime: end, roles: editProposal.shift.roles }));
                    setEditProposal(null);
                  }}>
                  Speichern
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Mitarbeiter anlegen Modal */}
      {showAddEmp && (
        <div className="ov" onClick={() => { setShowAddEmp(false); setNewEmpName(""); setNewEmpPw(""); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Mitarbeiter anlegen</div>
            <div className="modal-s">Neuen Zugang für {market?.name} erstellen.</div>
            <div className="field"><label>Vollständiger Name</label>
              <input type="text" placeholder="Vor- und Nachname" value={newEmpName} onChange={e => setNewEmpName(e.target.value)} />
            </div>
            <div className="field"><label>Initiales Passwort</label>
              <input type="password" placeholder="Temporäres Passwort vergeben" value={newEmpPw}
                onChange={e => setNewEmpPw(e.target.value)} />
            </div>
            <div className="field"><label>Wochenstunden-Soll (optional)</label>
              <input type="number" placeholder="z.B. 35" min="1" max="48" value={newEmpHours}
                onChange={e => setNewEmpHours(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addEmp()} />
            </div>
            {roles.length > 0 && (
              <div className="field">
                <label>Feste Abteilung(en)</label>
                <div className="role-chip-wrap" style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 4 }}>
                  {roles.map(r => {
                    const on = newEmpRoles.includes(r.name);
                    return (
                      <label key={r.id} className="role-chip" style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontSize: 13,
                        background: on ? r.color + "22" : "#F8FAFC", border: `1.5px solid ${on ? r.color : "#E2E8F0"}`,
                        borderRadius: 7, padding: "4px 10px", userSelect: "none" }}>
                        <input type="checkbox" checked={on} onChange={() => toggleNewEmpRole(r.name)} style={{ accentColor: r.color }} />
                        <span style={{ fontWeight: 700, color: on ? r.color : "#64748B" }}>{r.name}</span>
                      </label>
                    );
                  })}
                </div>
              </div>
            )}
            <div className="pw-hint">Der Mitarbeiter wird beim ersten Login aufgefordert, ein eigenes Passwort zu setzen.</div>
            <div className="macts">
              <button className="btn-cancel" onClick={() => { setShowAddEmp(false); setNewEmpName(""); setNewEmpPw(""); setNewEmpHours(""); setNewEmpRoles([]); }}>Abbrechen</button>
              <button className="btn-ok" disabled={!newEmpName.trim() || !newEmpPw} onClick={addEmp}>Anlegen</button>
            </div>
          </div>
        </div>
      )}

      {/* Mitarbeiter bearbeiten Modal */}
      {editEmp && (
        <div className="ov" onClick={() => setEditEmp(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Mitarbeiter bearbeiten</div>
            <div className="modal-s" style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontWeight: 700, color: "#1E293B" }}>{editEmp.name}</span>
              {editEmp.isMarktleiter && <span style={{ fontSize: 9, fontWeight: 800, background: "#0F172A", color: "#fff", borderRadius: 4, padding: "1px 5px" }}>ML</span>}
            </div>
            {isAdmin && (
              <div className="field" style={{ marginBottom: 10 }}>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                  <input type="checkbox" checked={!!editEmp.isMarktleiter}
                    onChange={e => setEditEmp(p => ({ ...p, isMarktleiter: e.target.checked, isSchliessKraft: e.target.checked ? false : p.isSchliessKraft,
                      defaultRoles: e.target.checked ? ["Marktleiter"] : (p.defaultRoles ?? []).filter(r => r !== "Marktleiter") }))}
                    style={{ width: 16, height: 16, accentColor: "#0F172A" }} />
                  <span style={{ fontWeight: 700, fontSize: 13, color: "#1E293B" }}>Marktleiter</span>
                  <span style={{ fontSize: 11, color: "#94A3B8" }}>(Öffnen 06:30 · Schließen 20:30)</span>
                </label>
              </div>
            )}
            {!editEmp.isMarktleiter && (
              <div className="field" style={{ marginBottom: 10 }}>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                  <input type="checkbox" checked={!!editEmp.isSchliessKraft}
                    onChange={e => setEditEmp(p => ({ ...p, isSchliessKraft: e.target.checked }))}
                    style={{ width: 16, height: 16, accentColor: "#0369A1" }} />
                  <span style={{ fontWeight: 700, fontSize: 13, color: "#1E293B" }}>Schließkraft</span>
                  <span style={{ fontSize: 11, color: "#94A3B8" }}>(kann Früh- u. Spätschicht schließen)</span>
                </label>
              </div>
            )}
            <div className="field"><label>Wochenstunden-Soll</label>
              <input type="number" placeholder="z.B. 40" min="1" max="48" value={editEmp.weeklyHours}
                onChange={e => setEditEmp(p => ({ ...p, weeklyHours: e.target.value }))} />
            </div>
            {roles.length > 0 && (
              <div className="field">
                <label>Feste Abteilung(en)</label>
                <div className="role-chip-wrap" style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 4 }}>
                  {roles.map(r => {
                    const on = (editEmp.defaultRoles ?? []).includes(r.name);
                    return (
                      <label key={r.id} className="role-chip" style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontSize: 13,
                        background: on ? r.color + "22" : "#F8FAFC", border: `1.5px solid ${on ? r.color : "#E2E8F0"}`,
                        borderRadius: 7, padding: "4px 10px", userSelect: "none" }}>
                        <input type="checkbox" checked={on} onChange={() =>
                          setEditEmp(p => ({ ...p, defaultRoles: on ? (p.defaultRoles ?? []).filter(x => x !== r.name) : [...(p.defaultRoles ?? []), r.name] }))
                        } style={{ accentColor: r.color }} />
                        <span style={{ fontWeight: 700, color: on ? r.color : "#64748B" }}>{r.name}</span>
                      </label>
                    );
                  })}
                </div>
              </div>
            )}
            {(isAdmin || !editEmp.isMarktleiter) && (
              <div className="field" style={{ marginTop: 14, background: "#FFFBEB", border: "1.5px solid #FDE68A", borderRadius: 10, padding: "10px 12px" }}>
                <label style={{ color: "#92400E" }}>🔑 Passwort zurücksetzen{editEmp.isMarktleiter ? " (nur Admin)" : ""}</label>
                {editEmp.isMarktleiter && !isAdmin
                  ? <div style={{ fontSize: 12, color: "#92400E", marginTop: 4 }}>Nur ein Admin kann das Passwort von Marktleitern zurücksetzen.</div>
                  : <>
                      <input type="password" placeholder="Neues Passwort eingeben"
                        value={editEmp.newPassword ?? ""}
                        onChange={e => setEditEmp(p => ({ ...p, newPassword: e.target.value }))}
                        style={{ marginTop: 6 }} />
                      {editEmp.newPassword?.trim() && (
                        <div style={{ fontSize: 11, color: "#92400E", marginTop: 4 }}>
                          ⚠️ Mitarbeiter wird beim nächsten Login aufgefordert, das Passwort zu ändern.
                        </div>
                      )}
                    </>
                }
              </div>
            )}
            <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid #FEE2E2" }}>
              <button
                onClick={() => { setEditEmp(null); setDelEmpModal(employees.find(e => e.id === editEmp.id)); }}
                style={{ width: "100%", padding: "8px", borderRadius: 8, border: "1.5px solid #FCA5A5", background: "#FFF1F2", color: "#DC2626", fontWeight: 700, fontSize: 13, cursor: "pointer" }}
              >
                🗑 {editEmp.name} entfernen
              </button>
            </div>
            <div className="macts">
              <button className="btn-cancel" onClick={() => setEditEmp(null)}>Abbrechen</button>
              <button className="btn-ok" onClick={saveEditEmp}>Speichern</button>
            </div>
          </div>
        </div>
      )}

      {showScan && (
        <ScanModal marketId={marketId} employees={employees}
          onImport={onImportAvailability} onClose={() => setShowScan(false)} />
      )}


      {showDelivery && (
        <DeliveryModal config={deliveryConfig} onSave={onUpdateDelivery} onClose={() => setShowDelivery(false)} />
      )}

      {showRoles && (
        <RolesModal roles={roles} thresholds={thresholds} marketHours={marketHours} onSave={onUpdateRoles} onClose={() => setShowRoles(false)} />
      )}

      {delEmpModal && (
        <div className="ov" onClick={() => setDelEmpModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-t">Mitarbeiter entfernen</div>
            <div className="modal-s">Soll <strong>{delEmpModal.name}</strong> wirklich gelöscht werden?</div>
            <div className="minfo">
              <div className="minfo-r"><span className="k">Achtung</span><span className="v" style={{ color: "#DC2626" }}>Nicht rückgängig machbar</span></div>
              <div className="minfo-r"><span className="k">Entfernt auch</span><span className="v">Alle Verfügbarkeiten & Schichten</span></div>
            </div>
            <div className="macts">
              <button className="btn-cancel" onClick={() => setDelEmpModal(null)}>Abbrechen</button>
              <button className="btn-del" onClick={() => { onDeleteEmployee(delEmpModal.id); setDelEmpModal(null); }}>
                Endgültig löschen
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
